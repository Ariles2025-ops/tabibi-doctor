<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="description" content="Vos notifications Tabibi.">
<link rel="canonical" href="https://tabibi.doctor/notifications.html">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0F7560">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon-192.png">
<meta name="tabibi-page-key" content="title_notifications">
<title>Notifications | Tabibi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  .notif-shell { padding: 14px 16px; max-width: 480px; margin: 0 auto; }
  .notif-card { background:#fff; border-radius: var(--r12); padding: 14px; margin-bottom: 10px; display:flex; gap: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  .notif-card.unread { border-left: 3px solid var(--blue); }
  .notif-card .ico { width: 40px; height: 40px; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size: 16px; flex-shrink: 0; }
  .notif-card .body { flex:1; min-width:0; }
  .notif-card .title { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .notif-card .msg { font-size: 13px; color: var(--text2); margin-bottom: 6px; line-height: 1.4; }
  .notif-card .time { font-size: 11px; color: var(--text3); }
  .notif-empty { padding: 48px 16px; text-align: center; color: var(--text3); }
  .notif-empty .ico-big { font-size: 48px; color: var(--text3); opacity: .4; margin-bottom: 14px; }
  .notif-disclaimer { background: #FFF7E6; border: 1px solid #FFD580; border-radius: var(--r12); padding: 12px; font-size: 12px; color: #78350f; margin-bottom: 14px; line-height: 1.5; }
</style>
</head>
<body>
<div class="app-root">
<header class="app-bar">
  <button class="btn btn-icon btn-icon-sm btn-ghost" onclick="goBackSafe()" aria-label="Retour"><i class='fa fa-arrow-left'></i></button>
  <div class="app-bar-body"><div class="app-bar-title">Notifications</div></div>
  <button class="btn btn-icon btn-icon-sm btn-ghost" onclick="markAllRead()" aria-label="Tout marquer lu" id="btn-mark-all"><i class="fa fa-check-double"></i></button>
</header>

<main class="page notif-shell" role="main">

  <!-- Disclaimer feature flag OFF -->
  <div class="notif-disclaimer" data-feature-not="notifications">
    <i class="fa fa-circle-info" style="color:#B07000;margin-right:6px"></i>
    <strong>Notifications in-app bientôt disponibles.</strong> Pour l'instant, vous recevrez
    confirmations et rappels par SMS au numéro renseigné dans votre profil.
  </div>

  <!-- Liste — vide si feature OFF, sinon fetch DB -->
  <div id="notif-list" aria-live="polite"></div>

</main>
<nav class="tab-bar" id="tab-bar"></nav>

<!-- [Phase 16.5] scripts/app.js retiré (404) -->
<script>
// ========================================================================
// [Phase 9.1] notifications.html — placeholder M0 in-app only
// ------------------------------------------------------------------------
// État M0 : feature flag notifications=false → affiche disclaimer +
// empty state. Quand backend prêt (TODO-SQL-010 : table notifications +
// triggers), passer flag à true → la liste se popule depuis Supabase.
// ========================================================================

function _esc(s){
  if(s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function _fmtRel(iso){
  if(!iso) return '';
  try {
    var ms = Date.now() - new Date(iso).getTime();
    var s = Math.floor(ms/1000);
    if(s < 60) return 'à l\'instant';
    var m = Math.floor(s/60);
    if(m < 60) return 'il y a ' + m + ' min';
    var h = Math.floor(m/60);
    if(h < 24) return 'il y a ' + h + ' h';
    var d = Math.floor(h/24);
    if(d < 7) return 'il y a ' + d + ' j';
    return new Intl.DateTimeFormat('fr-FR', {day:'numeric',month:'short',timeZone:'Africa/Algiers'}).format(new Date(iso));
  } catch(e){ return ''; }
}

var TYPE_META = {
  rdv_confirmed: { ico:'fa-calendar-check', color:'var(--blue)' },
  rdv_cancelled: { ico:'fa-calendar-xmark', color:'var(--red)' },
  rdv_reminder:  { ico:'fa-bell',           color:'#f59e0b' },
  prescription:  { ico:'fa-file-prescription', color:'var(--green)' },
  claim:         { ico:'fa-id-badge',       color:'#7c3aed' },
  system:        { ico:'fa-circle-info',    color:'var(--text3)' }
};

function _renderEmpty(){
  document.getElementById('notif-list').innerHTML =
    '<div class="notif-empty">' +
      '<i class="fa fa-bell-slash ico-big" aria-hidden="true"></i>' +
      '<div style="font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px">Aucune notification</div>' +
      '<div style="font-size:13px">Vos confirmations de RDV, rappels et autres alertes apparaîtront ici.</div>' +
    '</div>';
  var btn = document.getElementById('btn-mark-all');
  if(btn) btn.style.display = 'none';
}

function _renderList(items){
  if(!items || !items.length){ _renderEmpty(); return; }
  var box = document.getElementById('notif-list');
  box.innerHTML = items.map(function(n){
    var meta = TYPE_META[n.type] || TYPE_META.system;
    var unread = n.read_at == null;
    return '<article class="notif-card' + (unread?' unread':'') + '" data-id="' + _esc(n.id) + '">' +
      '<div class="ico" style="background:rgba(15,117,96,.1);color:' + meta.color + '"><i class="fa ' + meta.ico + '"></i></div>' +
      '<div class="body">' +
        '<div class="title">' + _esc(n.title || '') + '</div>' +
        '<div class="msg">' + _esc(n.message || '') + '</div>' +
        '<div class="time">' + _esc(_fmtRel(n.created_at)) + '</div>' +
      '</div>' +
    '</article>';
  }).join('');
}

async function loadNotifications(){
  // Si feature OFF : early empty state, pas de fetch
  if(!window.TABIBI_FEATURES || !window.TABIBI_FEATURES.notifications){
    _renderEmpty();
    return;
  }
  // Quand feature ON : fetch via supabase + tabibi-bridge
  try {
    var sb = window.tabibi && window.tabibi.supabase;
    if(!sb){ _renderEmpty(); return; }
    var r = await sb.from('notifications').select('*').order('created_at', { ascending:false }).limit(50);
    if(r.error){ console.warn('[notif] fetch error', r.error.message); _renderEmpty(); return; }
    _renderList(r.data || []);
  } catch(e){
    console.warn('[notif] exception', e && e.message);
    _renderEmpty();
  }
}

async function markAllRead(){
  if(!window.TABIBI_FEATURES || !window.TABIBI_FEATURES.notifications) return;
  try {
    var sb = window.tabibi && window.tabibi.supabase;
    if(!sb) return;
    await sb.from('notifications').update({ read_at: new Date().toISOString() }).is('read_at', null);
    loadNotifications();
  } catch(e){ console.warn('[notif] markAllRead exception', e && e.message); }
}

function goBackSafe(){
  if(document.referrer) history.back();
  else location.href = 'patient-dashboard.html';
}

document.addEventListener('DOMContentLoaded', function(){
  loadNotifications();
});
window.markAllRead = markAllRead;
window.goBackSafe = goBackSafe;
window.loadNotifications = loadNotifications;
</script>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/tabibi-bridge.js"></script>
<script src="js/tabibi-features.js"></script>
<script src="js/tabibi-lang.js"></script>
<script src="js/tabibi-i18n.js"></script>
</body>
</html>

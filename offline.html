<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="tabibi-page-key" content="title_offline">
<title>Hors ligne — Tabibi</title>
<meta name="description" content="Connexion perdue. Tabibi reprendra dès le retour du réseau.">
<meta name="robots" content="noindex,nofollow">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>
<script>(function(){var k=function(){var s=document.getElementById("splash");if(s)s.remove();var l=document.getElementById("loading");if(l)l.classList.add("hidden");};k();document.addEventListener("DOMContentLoaded",k);window.addEventListener("error",k);})();</script>

<div class="app-root" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;background:linear-gradient(155deg,#0a4d3e,var(--blue,#0F7560),#1a8a73)">
  <div style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:24px;padding:40px 28px;text-align:center;max-width:340px;width:100%;backdrop-filter:blur(12px)">
    <div style="font-size:52px;margin-bottom:16px"><i class="fa fa-satellite-dish"></i></div>
    <h1 style="font-size:20px;font-weight:800;color:#fff;margin-bottom:8px">Pas de connexion</h1>
    <p style="font-size:13px;color:rgba(255,255,255,.75);margin-bottom:24px;line-height:1.6">Tabibi nécessite une connexion Internet pour afficher les médecins. Vérifiez votre connexion et réessayez.</p>
    <button onclick="location.reload()" style="background:#fff;color:#0F7560;font-weight:700;padding:12px 24px;border-radius:12px;border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;margin:0 auto">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.08"/></svg>
      Réessayer
    </button>
    <div style="margin-top:20px;font-size:12px;color:rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;gap:6px">
      <div style="width:8px;height:8px;border-radius:50%;background:#f87171;animation:pulse 1.5s infinite"></div>
      Hors connexion · Tabibi طبيبي
    </div>
  </div>
</div>
<script>window.addEventListener('online',()=>location.reload());</script>
<script src="js/tabibi-lang.js"></script>
<script src="js/tabibi-i18n.js"></script>
</body>
</html>

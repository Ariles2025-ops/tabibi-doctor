<div class="app-root">

<main id="main" class="page" style="padding:20px 16px 40px" role="main">

    <div class="logo-mark" style="margin:0 auto 12px"></div>
    <h2 style="font-size:22px;font-weight:800">Rejoindre Tabibi</h2>

      <button type="button" role="radio" aria-checked="false" class="role-btn" onclick="selRole('secretaire',this)" style="padding:14px;border:2px solid var(--border);border-radius:12px;background:#fff;color:var(--text2);font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px">
        <i class="fa fa-headset" style="font-size:20px" aria-hidden="true"></i><span data-i18n="role_secretaire">Secrétariat</span></button>

  </div>
  <div class="card" style="max-width:400px;margin:0 auto">
    <form onsubmit="doSignup(event)">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div class="form-group"><label class="form-label" for="sf">Prénom *</label><input class="form-control" id="sf" required autocomplete="given-name"></div>
        <div class="form-group"><label class="form-label" for="sl">Nom *</label><input class="form-control" id="sl" required autocomplete="family-name"></div>
      </div>
      <div class="form-group"><label class="form-label" for="se">Email *</label>

        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);margin-bottom:10px;cursor:pointer">

          <span>Je consens au traitement de mes données personnelles selon la <a href="legal/confidentialite.html" target="_blank" rel="noopener noreferrer" style="color:var(--blue);font-weight:600">Politique de confidentialité</a>, conforme à la loi algérienne 18-07.</span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);margin-bottom:6px;cursor:pointer">
          <input type="checkbox" id="medical-consent" required style="margin-top:3px;flex-shrink:0">
          <span><b>Consentement données de santé :</b> J'autorise expressément le traitement de mes données médicales sensibles aux seules fins de la prise de rendez-vous (art. 18 loi 18-07).</span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--text3);cursor:pointer">
          <input type="checkbox" id="marketing-consent" style="margin-top:3px;flex-shrink:0">
          <span>(Optionnel) J'accepte de recevoir des conseils santé et offres Tabibi par email. Désabonnement en 1 clic.</span>
        </label>
      </div>
      <button class="btn btn-primary btn-full btn-xl" type="submit"><i class="fa fa-user-plus"></i> Créer mon compte</button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:13px;color:var(--text3)">

<div id="toast-container" role="region" aria-live="assertive" aria-atomic="true" aria-label="Notifications" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999"></div>
<script>
let cur="patient";

// [Phase 1 2026-05-21] Lecture query string pour auto-claim post-signup
// URL ex: signup.html?role=medecin&claim_legacy_id=1234
function _getClaimLegacyIdFromUrl(){
  try {
    var u = new URL(window.location.href);
    var raw = u.searchParams.get('claim_legacy_id');
    if (!raw) return null;
    var n = parseInt(raw, 10);
    if (!n || isNaN(n) || n < 1) return null;
    return n;
  } catch (e) { return null; }
}
function _getRoleFromUrl(){
  try { return (new URL(window.location.href)).searchParams.get('role') || null; }
  catch (e) { return null; }
}

function selRole(r,btn){
  cur=r;
  document.querySelectorAll(".role-btn").forEach(b=>{
    b.style.borderColor="var(--border)";b.style.background="#fff";b.style.color="var(--text2)";
    b.classList.remove("active");
    b.setAttribute("aria-checked","false");
  });
  btn.classList.add("active");
  btn.style.borderColor="var(--blue)";btn.style.background="var(--blue-l)";btn.style.color="var(--blue)";
  btn.setAttribute("aria-checked","true");
  document.getElementById("medecin-fields").classList.toggle("hidden",r!=="medecin");
  var cabEl=document.getElementById("cabinet-fields");
  if(cabEl) cabEl.classList.toggle("hidden", r!=="secretaire" && r!=="admin_cabinet");
}
function togglePw(id,btn){const i=document.getElementById(id);const t=i.type==="password";i.type=t?"text":"password";btn.querySelector("i").className=t?"fa fa-eye-slash":"fa fa-eye";}

async function doSignup(e){
  e.preventDefault();
  const fn=sf.value.trim(),ln=sl.value.trim(),em=se.value.trim().toLowerCase(),ph=sp.value.trim(),wi=sw.value,pw=spw.value;

  // ─── VALIDATIONS ───
  if(pw.length<8){toastM(tabibiT('toast_password_too_short',"Mot de passe trop court (8 caractères minimum)"),"error");return;}
  if(!fn || !ln){toastM(tabibiT('toast_firstname_lastname_required',"Prénom et nom obligatoires"),"error");return;}
  if(!em || !em.includes('@')){toastM(tabibiT('toast_email_invalid',"Email invalide"),"error");return;}
  if(!cgu.checked){toastM(tabibiT('toast_cgu_required',"Vous devez accepter les CGU pour créer un compte"),"error");return;}
  if(!document.getElementById("privacy").checked){toastM(tabibiT('toast_privacy_required',"Vous devez consentir à la politique de confidentialité"),"error");return;}
  if(!document.getElementById("medical-consent").checked){toastM(tabibiT('toast_health_consent_required',"Le consentement au traitement des données de santé est obligatoire"),"error");return;}
  if(cur==="medecin"&&(!ssp.value||!sord.value.trim())){toastM(tabibiT('toast_spec_ordre_required',"Spécialité et N° d'Ordre obligatoires"),"error");return;}

  // ─── SÉCURITÉ : empêcher toute tentative d'inscription en tant qu'admin global ───
  // Wave 4 (2026-05-19) : on autorise le rôle "secretaire" (multi-cabinet).
  // "admin_cabinet" reste réservé à une promotion serveur via accept_cabinet_invitation.
  if (cur !== "patient" && cur !== "medecin" && cur !== "secretaire") {
    toastM(tabibiT('toast_role_invalid',"Rôle invalide"), "error");
    return;
  }

  // ─── VALIDATION CODE CABINET (secrétariat) ───
  var cabCode = "";
  if (cur === "secretaire") {
    var scabEl = document.getElementById("scab");
    cabCode = scabEl ? scabEl.value.trim() : "";
    if (!cabCode || cabCode.length < 10) {
      toastM(tabibiT('toast_cabinet_code_required',"Le code d'invitation cabinet est obligatoire pour ce rôle."), "error");
      return;
    }
  }

  // Horodatage des consentements (preuve loi 18-07)
  const consents={
    cgu_accepted_at:new Date().toISOString(),
    privacy_accepted_at:new Date().toISOString(),
    medical_data_accepted_at:new Date().toISOString(),
    marketing_accepted_at:document.getElementById("marketing-consent").checked?new Date().toISOString():null,
    consents_version:"1.0"
  };

  const btn = e.target.querySelector('button[type="submit"]');
  const origText = btn ? btn.innerHTML : "";
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Création en cours...'; }

  // ─── INSCRIPTION VIA SUPABASE AUTH ───
  // [Phase 14.3 fix] Self-healing : si window.tabibi.auth manque (api.js ou
  // supabase-client.js a fail silencieusement, ou bridge désactivé), on init
  // un client Supabase EN INLINE et on appelle l'API directement. Évite
  // tout silent fail signup. Aucune dépendance externe au-delà du SDK Supabase
  // (chargé en ligne 422 via CDN).
  console.log('[signup] doSignup() start role=' + cur + ' email=' + em.substring(0,3) + '***');
  try {
    var sbClient = (window.tabibi && window.tabibi.supabase) || null;
    if (!sbClient) {
      // Bootstrap inline
      console.warn('[signup] window.tabibi.supabase absent, bootstrap inline');
      var SB_URL_LOC = (window.TABIBI_CONFIG && window.TABIBI_CONFIG.SUPABASE_URL) || 'https://pudugodhiofqrctcdwfl.supabase.co';
      var SB_KEY_LOC = (window.TABIBI_CONFIG && window.TABIBI_CONFIG.SUPABASE_ANON_KEY) || '';
      if (!window.supabase || typeof window.supabase.createClient !== 'function') {
        throw new Error("SDK Supabase non chargé — rechargez la page (Ctrl+R)");
      }
      if (!SB_KEY_LOC) {
        throw new Error("Configuration manquante — contact@tabibi.doctor");
      }
      sbClient = window.supabase.createClient(SB_URL_LOC, SB_KEY_LOC, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
      });
      // Cache pour les usages downstream (claim auto, upsert users)
      window.tabibi = window.tabibi || {};
      window.tabibi.supabase = sbClient;
    }

    // 1. Créer le compte Supabase Auth — call DIRECT au SDK, pas via wrapper
    console.log('[signup] auth.signUp() POST /auth/v1/signup …');
    var _signupRes = await sbClient.auth.signUp({
      email: em,
      password: pw,
      options: { data: { role: cur } }
    });
    // [Phase 15.1 fix] Détection officielle Supabase duplicate vs nouveau signup.
    // Référence : https://supabase.com/docs/reference/javascript/auth-signup
    //
    // Quand confirm_email=ON, Supabase retourne TOUJOURS data.user (avec id),
    // que ce soit un nouveau signup OU un duplicate silencieux (anti-enumeration).
    // La SEULE façon fiable de les distinguer :
    //   - Nouveau user      → data.user.identities = [{...}]  (1+ entrée)
    //   - Email déjà existe → data.user.identities = []       (array vide)
    // data.session est null DANS LES DEUX CAS tant que l'email n'est pas confirmé.
    //
    // L'ancien check Phase 15 `!signupResult.user` levait un faux duplicate
    // sur les signups réussis (data.user est toujours présent).

    if (_signupRes.error) {
      // Cas 1 : vraie erreur Supabase (400 format, network, etc.) → catch global
      console.warn('[signup] Supabase error', _signupRes.error);
      throw _signupRes.error;
    }
    var signupResult = _signupRes.data || {};
    var u = signupResult.user || null;

    if (!u) {
      // Cas inattendu : pas d'erreur ET pas de user. Shouldn't happen avec SDK v2.
      console.warn('[signup] Réponse inattendue : pas d\'erreur, pas de user', signupResult);
      if (btn) { btn.disabled = false; btn.innerHTML = origText; }
      toastM("Erreur inattendue. Réessayez ou contactez support@tabibi.doctor", "error");
      return;
    }

    // Cas 2 : duplicate silencieux détecté via identities vide
    if (Array.isArray(u.identities) && u.identities.length === 0) {
      console.log('[signup] DUPLICATE detected (identities=[]) email=' + em.substring(0,3) + '***');
      if (btn) { btn.disabled = false; btn.innerHTML = origText; }
      toastM(tabibiT('toast_email_already_used',
        "Cet email est déjà utilisé. Connectez-vous ou utilisez 'Mot de passe oublié'."),
        "warning");
      return;
    }

    // Cas 3 : succès (nouveau user créé). Log info détaillée pour debug.
    console.log('[signup] auth.signUp() OK user_id=' + u.id.substring(0,8) + '…'
              + ' identities=' + ((u.identities || []).length)
              + ' session=' + (signupResult.session ? 'yes' : 'no')
              + ' confirmation_sent=' + (u.confirmation_sent_at ? 'yes' : 'no'));

    // Si confirm_email=ON (config par défaut Supabase), session est null tant que
    // l'utilisateur n'a pas cliqué le lien de confirmation. Dans ce cas on
    // redirige TOUS les rôles vers /verify-email.html (au lieu de tenter dashboard
    // sans session, ou modale médecin qui suppose le compte actif).
    var needsEmailConfirm = !signupResult.session;

    // 2. Créer/compléter le profil dans public.profiles
    //    NOTE : le trigger set_profile_status mettra status='pending_verification' pour les médecins
    const profileData = {
      id: signupResult.user.id,
      email: em,
      first_name: fn,
      last_name: ln,
      full_name: fn + " " + ln,
      role: cur,
      phone: ph,
      wilaya_fr: wi,
      consents: consents,
      is_test: false
    };

    if (cur === "medecin") {
      profileData.specialty_fr = ssp.value;
      profileData.ordre_number = sord.value.trim();
    }
    if (cur === "secretaire") {
      profileData.cabinet_invite_code = cabCode; // trace côté users (champ optionnel)
    }

    const { error: profileError } = await window.tabibi.supabase
      .from('users')
      .upsert(profileData, { onConflict: 'id' });

    if (profileError) {
      console.warn("[signup] profile upsert error:", profileError.message);
      // Ne pas bloquer : le profil peut être complété au prochain login
    }

    // 2.bis Si rôle secrétariat : vérifier puis rattacher au cabinet via RPC.
    //       En V1 le code = UUID direct du cabinet ; une future EF tabibi-resolve-cabinet-code
    //       pourra résoudre des codes courts. Si la RPC échoue on bloque la suite.
    if (cur === "secretaire") {
      try {
        var validateRes = null;
        // Optionnel : vérification douce si la RPC validate_cabinet_invitation existe
        try {
          validateRes = await window.tabibi.supabase
            .rpc("validate_cabinet_invitation", { p_code: cabCode });
        } catch(_v) { validateRes = null; }
        const acceptRes = await window.tabibi.supabase
          .rpc("accept_cabinet_invitation", { p_cabinet_id: cabCode });
        if (acceptRes && acceptRes.error) {
          console.warn("[signup] accept_cabinet_invitation:", acceptRes.error.message);
          toastM(tabibiT('toast_cabinet_code_invalid',"Code cabinet invalide ou expiré"), "error");
          if (btn) { btn.disabled = false; btn.innerHTML = origText; }
          return;
        }
      } catch(rpcErr) {
        console.warn("[signup] cabinet RPC error:", rpcErr && rpcErr.message);
        toastM(tabibiT('toast_cabinet_code_invalid',"Code cabinet invalide ou expiré"), "error");
        if (btn) { btn.disabled = false; btn.innerHTML = origText; }
        return;
      }
      // Connexion conservée, redirection dashboard secrétariat
      const userData = {
        id: signupResult.user.id,
        email: em,
        role: "secretaire",
        status: "active",
        name: fn + " " + ln,
        initials: ((fn[0]||"")+(ln[0]||"")).toUpperCase(),
        firstName: fn, lastName: ln, phone: ph, ville: wi,
        consents: consents, fromSupabase: true
      };
      try { localStorage.setItem("tabibi_user", JSON.stringify(userData)); } catch(e){}
      try { localStorage.setItem("tabibi_role", "secretaire"); } catch(e){}
      // [Phase 15 fix] Si email confirm requis → verify-email page (compat email confirm ON)
      if (needsEmailConfirm) {
        location.href = '/verify-email.html?email=' + encodeURIComponent(em) + '&role=secretaire';
        return;
      }
      toastM(tabibiT('toast_signup_success',"Compte créé avec succès !"), "success");
      setTimeout(()=>location.href="secretaire-dashboard.html", 800);
      return;
    }

    // 3. Gérer la redirection selon le rôle
    if (cur === "medecin") {
      // MÉDECIN : compte en attente de validation manuelle
      //
      // [Phase 1 2026-05-21] AUTO-CLAIM AVANT signOut
      // Si l'utilisateur vient d'un bandeau "Réclamer ma fiche" (URL ?claim_legacy_id=...),
      // on appelle la RPC claim_my_doctor_profile MAINTENANT, tant que la session Supabase
      // est encore active. Si ça échoue (réseau, RLS), tabibiClaim.autoClaim() stocke le
      // legacy_id dans localStorage.tabibi_pending_claim_legacy_id et le retry se fera
      // au prochain login médecin (cf. js/tabibi-claim.js -> consumePending()).
      var claimLegacyId = _getClaimLegacyIdFromUrl();
      if (claimLegacyId && window.tabibiClaim && typeof window.tabibiClaim.autoClaim === 'function') {
        try {
          var claimRes = await window.tabibiClaim.autoClaim(claimLegacyId);
          if (claimRes && claimRes.ok) {
            console.log('[signup] auto-claim OK legacy_id=' + claimLegacyId);
          } else {
            console.warn('[signup] auto-claim failed:', claimRes && claimRes.error,
                         '-> stored for retry at next login');
          }
        } catch (claimErr) {
          console.warn('[signup] auto-claim exception:', claimErr);
          // fallback dur : stocker manuellement si le module a buggé
          try { localStorage.setItem('tabibi_pending_claim_legacy_id', String(claimLegacyId)); } catch(_){}
        }
      } else if (claimLegacyId) {
        // Module pas chargé -> fallback localStorage pur
        try { localStorage.setItem('tabibi_pending_claim_legacy_id', String(claimLegacyId)); } catch(_){}
      }

      // Déconnexion immédiate + message clair
      try { await window.tabibi.auth.signOut(); } catch(e){}
      localStorage.removeItem("tabibi_user");
      localStorage.removeItem("tabibi_role");

      // [Phase 15 fix] Si confirm email requis → verify-email page (avec disclaimer
      // validation 48h médecin via param pending_validation=1). Sinon (compat config
      // sans confirm) → ancienne modale "validation 48h".
      if (needsEmailConfirm) {
        location.href = '/verify-email.html?email=' + encodeURIComponent(em)
                      + '&role=medecin&pending_validation=1';
        return;
      }
      showMedecinPendingModal(em, fn);
      if (btn) { btn.disabled = false; btn.innerHTML = origText; }
      return;
    } else {
      // PATIENT : compte actif immédiatement
      const userData = {
        id: signupResult.user.id,
        email: em,
        role: "patient",
        status: "active",
        name: fn + " " + ln,
        initials: ((fn[0]||"")+(ln[0]||"")).toUpperCase(),
        firstName: fn,
        lastName: ln,
        phone: ph,
        ville: wi,
        consents: consents,
        fromSupabase: true
      };
      localStorage.setItem("tabibi_user", JSON.stringify(userData));
      localStorage.setItem("tabibi_role", "patient");
      // [Phase 15 fix] Si email confirm requis → verify-email page (compat email confirm ON)
      if (needsEmailConfirm) {
        location.href = '/verify-email.html?email=' + encodeURIComponent(em) + '&role=patient';
        return;
      }
      toastM(tabibiT('toast_signup_success',"Compte créé avec succès !"), "success");
      setTimeout(()=>location.href="patient-dashboard.html", 800);
    }

  } catch(err) {
    console.error("[signup] error:", err);
    if (btn) { btn.disabled = false; btn.innerHTML = origText; }
    const msg = (err && err.message) || "Erreur lors de l'inscription";
    if (msg.toLowerCase().includes("already registered") || msg.toLowerCase().includes("exists")) {
      toastM(tabibiT('toast_email_already_used',"Cet email est déjà utilisé. Connectez-vous."), "error");
    } else {
      toastM(msg, "error");
    }
  }
}

function showMedecinPendingModal(email, prenom) {
  const modal = document.createElement('div');
  modal.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;";
  modal.innerHTML = `
    <div style="background:#fff;border-radius:16px;max-width:480px;width:100%;padding:32px 24px;text-align:center;box-shadow:0 24px 48px rgba(0,0,0,0.2)">
      <div style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#0a4d3e,#0F7560);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        <i class="fa fa-user-doctor" style="font-size:36px;color:#fff"></i>
      </div>
      <h2 style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:8px">Bienvenue Dr ${prenom} !</h2>
      <p style="font-size:14px;color:#475569;line-height:1.6;margin-bottom:20px">
        Votre inscription a bien été enregistrée.
        <br><br>
        Notre équipe va vérifier vos qualifications (diplôme + Conseil de l'Ordre) sous <strong>48h ouvrées maximum</strong>.
        <br><br>
        Vous recevrez un email à <strong>${email}</strong> dès que votre compte sera activé.
      </p>
      <div style="background:#f0f9ff;border-radius:10px;padding:14px;margin-bottom:20px;text-align:left;font-size:13px;color:#0a4d3e">
        <strong>📋 Prochaine étape :</strong>
        <br>Préparez vos documents (diplôme + attestation Ordre) pour les envoyer à <strong>contact@tabibi.doctor</strong>
      </div>
      <button onclick="location.href='index.html'" style="width:100%;padding:14px;background:linear-gradient(135deg,#0a4d3e,#0F7560);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer">
        Retour à l'accueil
      </button>
    </div>
  `;
  document.body.appendChild(modal);
}

function toastM(m,t){const c=document.getElementById("toast-container");const col={success:"#10b981",error:"#ef4444",info:"#0F7560"};const d=document.createElement("div");d.style.cssText=`background:${col[t]};color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:8px;box-shadow:0 8px 28px rgba(0,0,0,.15)`;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),3000);}

// [Phase 1 2026-05-21] Auto-sélectionne le rôle médecin si l'utilisateur arrive
// depuis le bandeau "Réclamer ma fiche" (URL ?role=medecin&claim_legacy_id=N).
// Affiche aussi un bandeau info en haut du form pour confirmer la démarche.
document.addEventListener('DOMContentLoaded', function () {
  try {
    var claimLegacyId = _getClaimLegacyIdFromUrl();
    var roleParam = _getRoleFromUrl();
    if (claimLegacyId && (roleParam === 'medecin' || roleParam == null)) {
      // Sélectionne le bouton médecin programmatiquement
      var medBtn = document.querySelector('.role-btn[onclick*="medecin"]');
      if (medBtn) {
        try { selRole('medecin', medBtn); } catch (e) {}
      }
      // Bandeau info clair
      var form = document.querySelector('form') || document.querySelector('main');
      if (form) {
        var info = document.createElement('div');
        info.style.cssText = 'background:#dbeafe;border:1px solid #2563eb;color:#1e3a8a;padding:12px 16px;border-radius:10px;margin:0 0 16px;font-size:13px;display:flex;align-items:center;gap:10px';
        info.innerHTML = '<i class="fa fa-circle-info"></i> <span>Vous réclamez la fiche médecin <strong>#' + claimLegacyId + '</strong>. Créez votre compte médecin : la fiche vous sera automatiquement attribuée après validation.</span>';
        form.insertBefore(info, form.firstChild);
      }
    }
  } catch (e) { console.warn('[signup] claim-init', e); }
});

  .rdv-skeleton { background:#fff;border-radius:var(--r12);padding:14px;margin-bottom:10px;display:flex;gap:12px;animation:pulse 1.2s ease-in-out infinite; }
  .rdv-skeleton .sk-ava { width:48px;height:48px;border-radius:var(--r12);background:var(--bg2);flex-shrink:0; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

<!-- [Phase 16.5] scripts/app.js retiré (404) -->
<script>
// ========================================================================
// [Phase 5.2.4] mes-rdv.html — liste RDV patient + annulation
// ------------------------------------------------------------------------
// Dépend de :
//   • window.tabibiBooking.listMyAppointments() (Phase 5.2.1)
//   • window.tabibiBooking.cancelMyAppointment(id, reason)
//   • window.tabibiBooking.errorMessage(code)
//   • window.tabibiDoctorName.format(profile) (Phase 5.2.3-fix)
//
// Codes erreur spécifiques à cette page :
//   ERR_MESRDV_TOO_LATE_TO_CANCEL  — tentative d'annulation <24h avant
//
// (Les autres codes ERR_* viennent de tabibiBooking.)
// ========================================================================

var MESRDV_CODES = Object.freeze({
  ERR_MESRDV_TOO_LATE_TO_CANCEL: 'ERR_MESRDV_TOO_LATE_TO_CANCEL'
});
var MESRDV_MSG_FR = {
  ERR_MESRDV_TOO_LATE_TO_CANCEL: "Annulation impossible moins de 24h avant le RDV. Contactez le cabinet."
};
function mesrdvMessage(code){
  if(MESRDV_MSG_FR[code]) return MESRDV_MSG_FR[code];
  if(window.tabibiBooking && window.tabibiBooking.errorMessage){
    return window.tabibiBooking.errorMessage(code);
  }
  return "Erreur inattendue.";
}

// ── State ───────────────────────────────────────────────────────────────
var _allAppointments = [];   // raw rows du backend
var _groups = { upcoming: [], past: [], cancelled: [] };
var _currentTab = 'upcoming';
var _cancelInFlight = false;

// ── TZ + formats ────────────────────────────────────────────────────────
var _DF_DATE_FR = new Intl.DateTimeFormat('fr-FR', {
  weekday:'long', day:'numeric', month:'long', year:'numeric',
  timeZone:'Africa/Algiers'
});
var _DF_TIME_FR = new Intl.DateTimeFormat('fr-FR', {
  hour:'2-digit', minute:'2-digit', hour12:false,
  timeZone:'Africa/Algiers'
});
function _formatDate(iso){
  if(!iso) return '—';
  try { return _DF_DATE_FR.format(new Date(iso)); }
  catch(e) { return '—'; }
}
function _formatTime(iso){
  if(!iso) return '—';
  try { return _DF_TIME_FR.format(new Date(iso)); }
  catch(e) { return '—'; }
}
function _formatDateTime(iso){
  return _formatDate(iso) + ' · ' + _formatTime(iso);
}

// ── Doctor name fallback (utilise tabibiDoctorName si dispo) ────────────
function _doctorName(row){
  // Cherche les champs nom standardisés (la vue my_upcoming_appointments
  // peut exposer doctor_full_name, doctor_name, ou imbriqué).
  // [TODO-SQL-003] vérifier le schéma exact de la vue.
  var profile = {
    full_name:     row.doctor_full_name    || row.full_name    || (row.doctor && row.doctor.full_name)    || null,
    full_name_ar:  row.doctor_full_name_ar || row.full_name_ar || (row.doctor && row.doctor.full_name_ar) || null,
    entity_type:   row.doctor_entity_type  || row.entity_type  || (row.doctor && row.doctor.entity_type)  || null
  };
  if(window.tabibiDoctorName){
    return window.tabibiDoctorName.format(profile);
  }
  return profile.full_name || profile.full_name_ar || "Praticien";
}
function _doctorInitials(row){
  if(window.tabibiDoctorName){
    return window.tabibiDoctorName.initials({
      full_name:    row.doctor_full_name    || row.full_name    || null,
      full_name_ar: row.doctor_full_name_ar || row.full_name_ar || null
    });
  }
  return '?';
}
function _doctorSpec(row){
  return row.doctor_specialty_fr || row.specialty_fr
       || (row.doctor && (row.doctor.specialty_fr || row.doctor.specialty_name_fr))
       || '';
}
function _consultLocation(row){
  // Détecte téléconsultation vs cabinet — heuristique sur consult_type / cabinet
  var ctype = (row.consult_type || '').toLowerCase();
  if(ctype.indexOf('visio') !== -1 || ctype.indexOf('tele') !== -1){
    return { kind: 'visio', label: 'Téléconsultation' };
  }
  var addr = row.cabinet_address || (row.cabinet && row.cabinet.address) || '';
  if(addr) return { kind: 'cabinet', label: addr };
  var ville = row.cabinet_city || row.wilaya_fr || (row.cabinet && row.cabinet.city) || '';
  if(ville) return { kind: 'cabinet', label: ville };
  return { kind: 'cabinet', label: 'Cabinet' };
}

// ── Group appointments en 3 buckets ─────────────────────────────────────
function _groupAppointments(rows){
  var now = Date.now();
  var groups = { upcoming: [], past: [], cancelled: [] };
  (rows || []).forEach(function(r){
    var status = String(r.status || '').toLowerCase();
    var when = r.starts_at || r.scheduled_at;
    var whenMs = when ? new Date(when).getTime() : 0;
    if(status === 'cancelled'){
      groups.cancelled.push(r);
    } else if(status === 'completed' || status === 'no_show'){
      groups.past.push(r);
    } else if(whenMs && whenMs < now){
      groups.past.push(r);
    } else {
      groups.upcoming.push(r);
    }
  });
  // Tri : à venir = chronologique ASC, passés/annulés = DESC
  groups.upcoming.sort(function(a,b){
    return new Date(a.starts_at || a.scheduled_at) - new Date(b.starts_at || b.scheduled_at);
  });
  groups.past.sort(function(a,b){
    return new Date(b.starts_at || b.scheduled_at) - new Date(a.starts_at || a.scheduled_at);
  });
  groups.cancelled.sort(function(a,b){
    var ta = new Date(a.cancelled_at || a.starts_at || a.scheduled_at);
    var tb = new Date(b.cancelled_at || b.starts_at || b.scheduled_at);
    return tb - ta;
  });
  return groups;
}

// ── Can cancel (>24h avant) ─────────────────────────────────────────────
function _canCancel(row){
  var status = String(row.status || '').toLowerCase();
  if(status !== 'pending' && status !== 'confirmed') return false;
  var when = row.starts_at || row.scheduled_at;
  if(!when) return false;
  var ms = new Date(when).getTime() - Date.now();
  return ms > 24 * 3600 * 1000;
}

// ── Render ──────────────────────────────────────────────────────────────
function _renderCard(row, opts){
  opts = opts || {};
  var status = String(row.status || '').toLowerCase();
  var name = _doctorName(row);
  var ini  = _doctorInitials(row);
  var spec = _doctorSpec(row);
  var loc  = _consultLocation(row);
  var when = row.starts_at || row.scheduled_at;
  var canCancel = _canCancel(row);
  var statusBadge = '';
  if(status === 'cancelled') statusBadge = '<span class="badge-sm is-status-cancelled">Annulé</span>';
  else if(status === 'completed') statusBadge = '<span class="badge-sm is-status-completed">Terminé</span>';
  else if(status === 'pending') statusBadge = '<span class="badge-sm is-status-pending">En attente</span>';
  else if(status === 'no_show') statusBadge = '<span class="badge-sm is-status-cancelled">Absent</span>';

  var locBadge = '<span class="badge-sm is-' + loc.kind + '">'
               + '<i class="fa fa-' + (loc.kind === 'visio' ? 'video' : 'location-dot') + '"></i> '
               + _escapeHtml(loc.label) + '</span>';

  var dateBadge = '<span class="badge-sm"><i class="fa fa-calendar-day"></i> '
                + _escapeHtml(_formatDateTime(when)) + '</span>';

  var reasonHtml = '';
  if(row.reason){
    reasonHtml = '<div class="reason">' + _escapeHtml(row.reason) + '</div>';
  }
  if(status === 'cancelled' && row.cancellation_reason){
    reasonHtml += '<div class="reason"><em>Motif annulation : ' + _escapeHtml(row.cancellation_reason) + '</em></div>';
  }

  var actionsHtml = '';
  if(opts.section === 'upcoming'){
    var disabledAttr = canCancel ? '' : 'disabled';
    var title = canCancel ? 'Annuler ce RDV' : 'Annulation impossible <24h avant le RDV';
    actionsHtml = '<div class="actions">'
                + '<button class="btn-cancel" '+disabledAttr+' title="' + _escapeAttr(title) + '" '
                + 'onclick="doCancel(\''+ _escapeAttr(row.id) +'\')">'
                + '<i class="fa fa-xmark"></i> Annuler</button>'
                + '</div>';
  }

  return '<article class="rdv-card" data-id="'+_escapeAttr(row.id)+'">'
       + '<div class="ava">'+_escapeHtml(ini || '?')+'</div>'
       + '<div class="body">'
       +   '<div class="docname">'+_escapeHtml(name)+'</div>'
       +   (spec ? '<div class="spec">'+_escapeHtml(spec)+'</div>' : '')
       +   '<div class="meta">'+dateBadge+' '+locBadge+' '+statusBadge+'</div>'
       +   reasonHtml
       +   actionsHtml
       + '</div>'
       + '</article>';
}

function _renderEmpty(section){
  var msgMap = {
    upcoming:  { title:"Aucun rendez-vous à venir", sub:"Trouvez un médecin et réservez en quelques clics." },
    past:      { title:"Aucun rendez-vous passé",   sub:"Votre historique apparaîtra ici après votre 1ère consultation." },
    cancelled: { title:"Aucun rendez-vous annulé",  sub:"Vos annulations apparaîtront ici." }
  };
  var m = msgMap[section] || msgMap.upcoming;
  return '<div class="rdv-empty">'
       + '<i class="fa fa-calendar-xmark ico"></i>'
       + '<div class="title">'+m.title+'</div>'
       + '<div class="sub">'+m.sub+'</div>'
       + '<a href="index.html" class="btn btn-primary btn-lg"><i class="fa fa-search"></i> Trouver un médecin</a>'
       + '</div>';
}

function _renderSection(section){
  var list = _groups[section] || [];
  var html;
  if(list.length === 0){
    html = _renderEmpty(section);
  } else {
    html = list.map(function(r){ return _renderCard(r, { section: section }); }).join('');
  }
  document.getElementById('list-' + section).innerHTML = html;
  document.getElementById('count-' + section).textContent = list.length;
}

function _renderAll(){
  _renderSection('upcoming');
  _renderSection('past');
  _renderSection('cancelled');
}

function _renderSkeleton(){
  var sk = '<div class="rdv-skeleton"><div class="sk-ava"></div><div class="sk-lines">'
         + '<div class="sk-line"></div><div class="sk-line sm"></div><div class="sk-line xs"></div>'
         + '</div></div>';
  document.getElementById('list-upcoming').innerHTML = sk + sk + sk;
}

// ── Tabs ────────────────────────────────────────────────────────────────
function showTab(name){
  _currentTab = name;
  ['upcoming','past','cancelled'].forEach(function(s){
    var tab = document.getElementById('tab-' + s);
    var sec = document.getElementById('section-' + s);
    var isActive = (s === name);
    tab.classList.toggle('active', isActive);
    tab.setAttribute('aria-selected', isActive);
    sec.classList.toggle('hidden', !isActive);
  });
}

// ── Auth wall ───────────────────────────────────────────────────────────
function _showAuthWall(){
  document.getElementById('auth-wall').classList.remove('hidden');
  document.getElementById('global-error').classList.add('hidden');
  ['upcoming','past','cancelled'].forEach(function(s){
    document.getElementById('section-' + s).classList.add('hidden');
  });
  document.querySelector('.rdv-tabs').classList.add('hidden');
  var login = document.getElementById('auth-wall-login');
  if(login){
    var current = location.pathname + location.search;
    login.href = 'login.html?next=' + encodeURIComponent(current);
  }
}
function _showError(msg){
  document.getElementById('global-error-msg').textContent = msg;
  document.getElementById('global-error').classList.remove('hidden');
}
function _hideError(){
  document.getElementById('global-error').classList.add('hidden');
}

// ── Load + cancel ───────────────────────────────────────────────────────
async function loadAppointments(){
  _hideError();
  document.getElementById('auth-wall').classList.add('hidden');
  document.querySelector('.rdv-tabs').classList.remove('hidden');
  ['upcoming','past','cancelled'].forEach(function(s){
    document.getElementById('section-' + s).classList.toggle('hidden', s !== _currentTab);
  });
  _renderSkeleton();

  if(!window.tabibiBooking){
    _showError("Module de réservation indisponible. Rechargez la page.");
    return;
  }

  var r = await window.tabibiBooking.listMyAppointments();

  if(!r.ok){
    if(r.error === 'ERR_AUTH_REQUIRED' || r.error === 'ERR_SESSION_EXPIRED'){
      _showAuthWall();
      return;
    }
    _showError(mesrdvMessage(r.error));
    return;
  }

  _allAppointments = r.data || [];
  _groups = _groupAppointments(_allAppointments);
  _renderAll();
}

async function doCancel(id){
  if(_cancelInFlight){
    toast("Annulation déjà en cours…", "info");
    return;
  }
  // Re-check >24h client-side au moment du clic (au cas où l'utilisateur
  // serait resté longtemps sur la page).
  var row = _allAppointments.find(function(r){ return r.id === id; });
  if(row && !_canCancel(row)){
    toast(mesrdvMessage(MESRDV_CODES.ERR_MESRDV_TOO_LATE_TO_CANCEL), "warning");
    return;
  }
  if(!confirm("Annuler ce rendez-vous ?\nVous pourrez en reprendre un nouveau si besoin.")){
    return;
  }
  _cancelInFlight = true;
  var btn = document.querySelector('.rdv-card[data-id="'+id+'"] .btn-cancel');
  if(btn){ btn.disabled = true; btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> …'; }

  var r = await window.tabibiBooking.cancelMyAppointment(id, '');
  _cancelInFlight = false;

  if(r.ok){
    toast("Rendez-vous annulé.", "success");
    // Refresh complet pour récupérer le nouveau status + déplacer la card
    // de "À venir" vers "Annulés" proprement.
    loadAppointments();
    return;
  }
  if(r.error === 'ERR_AUTH_REQUIRED' || r.error === 'ERR_SESSION_EXPIRED'){
    _showAuthWall();
    return;
  }
  toast(mesrdvMessage(r.error), "error");
  if(btn){ btn.disabled = false; btn.innerHTML = '<i class="fa fa-xmark"></i> Annuler'; }
}

// ── Escape helpers (XSS-safe innerHTML) ────────────────────────────────
function _escapeHtml(s){
  if(s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function _escapeAttr(s){ return _escapeHtml(s); }

// ── Goback + init ───────────────────────────────────────────────────────
function goBackSafe(){
  if(document.referrer) history.back();
  else window.location.href = "index.html";
}

function init(){
  if(typeof loadUser === 'function') loadUser();
  if(typeof setLang === 'function') setLang(lang);
  if(typeof renderUserUI === 'function') renderUserUI();
  if(typeof initTabBar === 'function') initTabBar("rdv");
  if(typeof hideLoading === 'function') hideLoading();
  loadAppointments();
}

document.addEventListener("DOMContentLoaded", init);
window.showTab = showTab;
window.doCancel = doCancel;
window.goBackSafe = goBackSafe;
window.loadAppointments = loadAppointments;
</script>

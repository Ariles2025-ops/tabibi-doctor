<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<!-- SEO -->
<meta name="description" content="Confirmation de l'opération.">
<link rel="canonical" href="https://tabibi.doctor/success.html">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#10b981">
<link rel="manifest" href="manifest.json">
<meta name="tabibi-page-key" content="title_success">
<title>Confirmation | Tabibi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
<style>
@keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.success-circle{animation:pop .6s cubic-bezier(.34,1.56,.64,1)}
.confetti{position:fixed;width:8px;height:8px;animation:fall 3s linear forwards;pointer-events:none}
@keyframes fall{0%{transform:translateY(-100vh) rotate(0)}100%{transform:translateY(100vh) rotate(720deg)}}
</style>
</head>
<body>
<script src="scripts/seed.js"></script>
<script>(function(){var k=function(){var s=document.getElementById("splash");if(s)s.remove();var l=document.getElementById("loading");if(l)l.classList.add("hidden");};k();document.addEventListener("DOMContentLoaded",k);})();</script>
<div class="app-root">
<main class="page" style="padding:40px 16px;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center">
  <div class="success-circle" style="width:120px;height:120px;background:var(--green-l);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px">
    <i class="fa fa-circle-check" style="font-size:64px;color:var(--green)"></i>
  </div>
  <h1 style="font-size:26px;font-weight:800;margin-bottom:10px">Rendez-vous confirmé !</h1>
  <p style="color:var(--text3);margin-bottom:24px;font-size:14px">Un SMS et un email de confirmation vous ont été envoyés.</p>
  <div class="card" style="max-width:400px;margin:0 auto 20px;text-align:left" id="receipt">
    <div style="font-size:12px;color:var(--text3);margin-bottom:14px;text-transform:uppercase;font-weight:700">Récapitulatif</div>
    <div id="receipt-body"></div>
  </div>
  <div style="display:flex;flex-direction:column;gap:10px;max-width:400px;margin:0 auto;width:100%">
    <a href="patient-dashboard.html" class="btn btn-primary btn-full btn-lg"><i class="fa fa-calendar"></i> Voir mes rendez-vous</a>
    <a href="index.html" class="btn btn-ghost btn-full btn-lg"><i class="fa fa-home"></i> Retour à l'accueil</a>
    <button class="btn btn-soft btn-full" onclick="window.print()"><i class="fa fa-print"></i> Imprimer le reçu</button>
  </div>
</main>
<script>
function makeConfetti(){
  const colors=["#0F7560","#10b981","#f59e0b","#ef4444","#7c3aed"];
  for(let i=0;i<40;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDelay=Math.random()*2+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),3500);
  }
}
function loadReceipt(){
  const last=JSON.parse(localStorage.getItem("tabibi_last_rdv")||"null")
    || JSON.parse(localStorage.getItem("tabibi_rdv")||"[]").slice(-1)[0];
  if(!last){document.getElementById("receipt").style.display="none";return;}
  const tx="TX-"+Date.now().toString().slice(-8);
  document.getElementById("receipt-body").innerHTML=[
    ["Référence",tx],["Médecin",last.doctorName||"—"],["Spécialité",last.spec||"—"],
    ["Date",last.date||"—"],["Heure",last.time||last.slot||"—"],
    ["Mode paiement",last.payMethod||"—"],["Montant",(last.prix||0).toLocaleString()+" DA"]
  ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg2);font-size:13px">
    <span style="color:var(--text3)">${k}</span><span style="font-weight:600">${v}</span></div>`).join("");
}
document.addEventListener("DOMContentLoaded",()=>{loadReceipt();makeConfetti();});
</script>
</div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/tabibi-bridge.js"></script>
<script src="js/tabibi-beta.js"></script>
<script src="js/tabibi-lang.js"></script>
<script src="js/tabibi-i18n.js"></script>
<script src="js/tabibi-sentry.js"></script>
</body></html>

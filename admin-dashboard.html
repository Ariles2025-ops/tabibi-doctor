async function logout(){
  if(!confirm(tabibiT('confirm_logout',"Voulez-vous vous déconnecter ?"))) return;
  try {
    if (window.tabibi && window.tabibi.auth) {
      await window.tabibi.auth.signOut();
    } else if (window.tabibi && window.tabibi.supabase) {
      await window.tabibi.supabase.auth.signOut();
    }
  } catch(e) {}
  try {
    localStorage.removeItem("tabibi_user");
    localStorage.removeItem("tabibi_role");
    sessionStorage.setItem("tabibi_just_logged_out", "1");
  } catch(e) {}
  location.href="index.html";
}

function sw(tab,btn){
  try {
    console.log('[admin-dashboard] tab switched to:', tab);
    document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
    const target = document.getElementById("tab-"+tab);
    if(target) target.classList.add("active");
    document.querySelectorAll(".dash-tabs .dash-tab").forEach(b=>b.classList.remove("active"));
    if(btn) btn.classList.add("active");
    if(tab==="overview") { try { renderOverview(); } catch(e){ console.warn('[admin-dashboard] renderOverview:', e); } }
    if(tab==="users") { try { renderU(); } catch(e){ console.warn('[admin-dashboard] renderU:', e); } }
    if(tab==="doctors") {
      try {
        if (typeof loadDoctorsFromSupabase === 'function') {
          loadDoctorsFromSupabase().then(() => { try { renderD(); } catch(e){ console.warn('[admin-dashboard] renderD:', e); } }).catch(e => console.warn('[admin-dashboard] loadDoctorsFromSupabase:', e));
        } else {
          renderD();
        }
      } catch(e){ console.warn('[admin-dashboard] doctors tab:', e); }
    }
    if(tab==="rdv") { try { renderRdv(); } catch(e){ console.warn('[admin-dashboard] renderRdv:', e); } }
    if(tab==="payments") { try { renderPay(); } catch(e){ console.warn('[admin-dashboard] renderPay:', e); } }
  } catch(e) { console.warn('[admin-dashboard] sw() top-level:', e); }
}

    <div style="font-size:10px;color:var(--text4)">${a.d}</div></div>`).join("");
  document.getElementById("city-bars").innerHTML=[
    ["Alger",420,"#0F7560"],["Oran",180,"#10b981"],["Constantine",140,"#f59e0b"],["Annaba",95,"#7c3aed"],["Blida",80,"#ef4444"]
  ].map(([n,v,c])=>{const p=Math.round(v/420*100);return `<div style="display:grid;grid-template-columns:80px 1fr 60px;gap:8px;align-items:center;margin-bottom:8px"><div style="font-size:12px;font-weight:600">${n}</div><div style="background:var(--bg2);height:20px;border-radius:5px;overflow:hidden"><div style="width:${p}%;height:100%;background:${c}"></div></div><div style="font-size:11px;text-align:right;color:var(--text3)">${v}</div></div>`;}).join("");

function filtU(r,btn){currentRoleFilt=r;document.querySelectorAll("[data-r]").forEach(b=>b.classList.remove("active"));if(btn) btn.classList.add("active");renderU();}
function renderU(){
  const q=(document.getElementById("usearch")?.value||"").toLowerCase();
  let list=USERS.filter(u=>{
    if(currentRoleFilt!=="all" && u.r!==currentRoleFilt) return false;
    if(q && !(u.n.toLowerCase().includes(q)||u.e.toLowerCase().includes(q))) return false;
    return true;
  });
  document.getElementById("ucount").textContent=list.length;
  // [WAVE4-XSS] Escape user-controlled fields (name/email/spec/role/status).
  const _esc = (window.tabibiSec && window.tabibiSec.escapeHtml) || (window.esc) || (s => String(s==null?'':s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c])));
  document.getElementById("users-list").innerHTML=list.map(u=>{
    const initials = (u.n||'').split(" ").map(x=>x[0]||'').slice(0,2).join("");
    return `<div class="adm-row">
    <div style="width:42px;height:42px;border-radius:50%;background:${u.r==="medecin"?"#dcfce7":u.r==="admin"?"#f3e8ff":"#dcfce7"};color:${u.r==="medecin"?"#166534":u.r==="admin"?"#7c3aed":"#0a4d3e"};display:flex;align-items:center;justify-content:center;font-weight:700">${_esc(initials)}</div>
    <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px">${_esc(u.n)}</div><div style="font-size:11px;color:var(--text3)">${_esc(u.e)}${u.spec?' · '+_esc(u.spec):''}</div></div>
    <span class="badge ${u.r==="medecin"?"badge-green":u.r==="admin"?"badge-red":"badge-blue"}">${_esc(u.r)}</span>
    <span class="badge ${u.s==="active"?"badge-green":"badge-amber"}" style="font-size:9px">${_esc(u.s)}</span>
  </div>`;}).join("");
}

// ═══════════════════════════════════════════════════════════════════════
// VALIDATION MÉDECIN v10 — Supabase réel + emails Brevo automatiques
// ═══════════════════════════════════════════════════════════════════════
let DOCTORS_REAL = [];  // Cache des médecins depuis Supabase

async function loadDoctorsFromSupabase() {
  if (!window.tabibi || !window.tabibi.supabase) {
    console.warn("[admin] Supabase indisponible, fallback mock data");
    return;
  }
  try {
    const { data, error } = await window.tabibi.supabase
      .from('users')
      .select('id, email, first_name, last_name, phone, status, role, created_at, verified_at, specialty_fr, ordre_number')
      .in('role', ['medecin', 'doctor'])
      .order('created_at', { ascending: false })
      .limit(200);
    if (error) throw error;
    DOCTORS_REAL = data || [];
  } catch (err) {
    console.error("[admin] loadDoctors error:", err);
    DOCTORS_REAL = [];
  }
}

function renderD(){
  // Si on a des vraies données Supabase, on les utilise
  const meds = DOCTORS_REAL.length > 0 ? DOCTORS_REAL.map(d => ({
    id: d.id,
    n: ((d.first_name||'') + ' ' + (d.last_name||'')).trim() || d.email,
    e: d.email,
    p: d.phone || '',
    spec: d.specialty_fr || '',
    s: d.status === 'pending_verification' ? 'pending' : (d.status || 'active'),
    ordre: d.ordre_number || ''
  })) : USERS.filter(u=>u.r==="medecin");

  const pend = meds.filter(d => d.s === 'pending' || d.s === 'pending_verification');
  const active = meds.filter(d => d.s === 'active');
  const rejected = meds.filter(d => d.s === 'rejected');

  document.getElementById("pend-count").innerHTML = `<i class="fa fa-clock"></i> ${pend.length} en attente`;

  // Section TOP : médecins en attente (prioritaires)
  const pendingSection = pend.length > 0 ? `
    <div style="margin-bottom:20px">
      <h3 style="font-size:14px;font-weight:700;color:#f59e0b;margin-bottom:10px;display:flex;align-items:center;gap:6px">
        <i class="fa fa-clock"></i> ${pend.length} médecin${pend.length>1?'s':''} en attente de validation
      </h3>
      ${pend.map(d => doctorCard(d, true)).join("")}
    </div>` : '';

  // Section médecins actifs (sobre)
  const activeSection = active.length > 0 ? `
    <div style="margin-top:20px">
      <h3 style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:10px">
        ${active.length} médecin${active.length>1?'s actifs':' actif'}
      </h3>
      ${active.slice(0, 20).map(d => doctorCard(d, false)).join("")}
      ${active.length > 20 ? `<p style="text-align:center;color:var(--text3);font-size:12px;padding:8px">+ ${active.length - 20} autres…</p>` : ''}
    </div>` : '';

  document.getElementById("doctors-list").innerHTML = pendingSection + activeSection;
}

function doctorCard(d, isPending) {
  const initials = d.n.split(" ").slice(-2).map(x=>x[0]||'').join("").toUpperCase() || '?';
  const bg = isPending ? '#fff7ed' : '#dcfce7';
  const tc = isPending ? '#92400e' : '#166534';
  const badge = isPending
    ? '<span class="badge badge-amber">⏳ Pending</span>'
    : (d.s === 'rejected' ? '<span class="badge badge-red">✗ Rejeté</span>' : '<span class="badge badge-green">✓ Actif</span>');

  const actions = isPending
    ? `<div style="display:flex;gap:8px;margin-top:10px">
         <button class="btn btn-success btn-sm" style="flex:1" onclick="validateDoctor('${d.id||d.e}','${escAttr(d.e)}','${escAttr(d.n)}')">
           <i class="fa fa-check"></i> Valider
         </button>
         <button class="btn btn-ghost btn-sm" style="flex:1;color:var(--red);border-color:var(--red-l)" onclick="rejectDoctor('${d.id||d.e}','${escAttr(d.e)}','${escAttr(d.n)}')">
           <i class="fa fa-xmark"></i> Rejeter
         </button>
       </div>`
    : '';

  return `<div class="card" style="padding:14px;margin-bottom:10px;${isPending?'border-left:3px solid #f59e0b':''}">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:48px;height:48px;border-radius:12px;background:${bg};color:${tc};display:flex;align-items:center;justify-content:center;font-weight:700">${initials}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700">${esc(d.n)}</div>
        <div style="font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          ${esc(d.spec||"Spécialité non renseignée")} · ${esc(d.e)}
        </div>
        <div style="font-size:11px;color:var(--text3)">
          <i class="fa fa-phone fa-xs"></i> ${esc(d.p||"-")}${d.ordre?' · N° Ordre: '+esc(d.ordre):''}
        </div>
      </div>
      ${badge}
    </div>
    ${actions}
  </div>`;
}

function escAttr(s) {
  return String(s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

async function validateDoctor(doctorId, email, name) {
  if (!confirm(`Valider le médecin ${name} ?\n\nIl recevra un email automatique.`)) return;

  if (!window.tabibi || !window.tabibi.supabase) {
    toastM(tabibiT('toast_supabase_unavailable',"Erreur: Supabase indisponible"), "error");
    return;
  }

  try {
    const { data, error } = await window.tabibi.supabase.rpc('admin_validate_doctor', {
      p_doctor_id: doctorId,
      p_action: 'validate',
      p_notes: 'Validé via admin dashboard'
    });

    if (error) throw error;
    if (data && data.error) throw new Error(data.error);

    // Récupérer la langue préférée du médecin
    let docLang = 'fr';
    try {
      const { data: udata } = await window.tabibi.supabase
        .from('users')
        .select('preferred_language')
        .eq('id', doctorId)
        .single();
      if (udata && udata.preferred_language && ['fr','ar','en'].includes(udata.preferred_language)) {
        docLang = udata.preferred_language;
      }
    } catch(e){}

    if (window.tabibiBrevo) {
      try {
        const firstName = name.split(' ')[0].replace('Dr.', '').replace('Dr', '').trim() || name;
        await window.tabibiBrevo.sendEmail('medecin_validated', email, { firstName, lang: docLang });
      } catch (e) {
        console.warn('[admin] Email validation failed');
      }
    }

    toastM(`✓ ${name} validé. Email envoyé.`, "success");
    await loadDoctorsFromSupabase();
    renderD();

  } catch (err) {
    console.error('[admin] validateDoctor');
    toastM(tabibiT('toast_error_prefix','Erreur: ') + (err.message || tabibiT('toast_validation_failed',"validation échouée")), "error");
  }
}

async function rejectDoctor(doctorId, email, name) {
  const reason = prompt(`Raison du rejet pour ${name} :\n(Ce message sera envoyé par email)`);
  if (!reason || reason.trim().length < 5) {
    toastM(tabibiT('toast_reason_too_short',"Raison trop courte (min 5 caractères)"), "error");
    return;
  }

  if (!window.tabibi || !window.tabibi.supabase) {
    toastM(tabibiT('toast_supabase_unavailable',"Erreur: Supabase indisponible"), "error");
    return;
  }

  try {
    const { data, error } = await window.tabibi.supabase.rpc('admin_validate_doctor', {
      p_doctor_id: doctorId,
      p_action: 'reject',
      p_reason: reason,
      p_notes: 'Rejeté via admin dashboard'
    });

    if (error) throw error;
    if (data && data.error) throw new Error(data.error);

    // Langue du médecin
    let docLang = 'fr';
    try {
      const { data: udata } = await window.tabibi.supabase
        .from('users')
        .select('preferred_language')
        .eq('id', doctorId)
        .single();
      if (udata && udata.preferred_language && ['fr','ar','en'].includes(udata.preferred_language)) {
        docLang = udata.preferred_language;
      }
    } catch(e){}

    if (window.tabibiBrevo) {
      try {
        const firstName = name.split(' ')[0].replace('Dr.', '').replace('Dr', '').trim() || name;
        await window.tabibiBrevo.sendEmail('medecin_rejected', email, { firstName, reason, lang: docLang });
      } catch (e) {
        console.warn('[admin] Email rejection failed');
      }
    }

    toastM(`${name} rejeté. Email envoyé.`, "info");
    await loadDoctorsFromSupabase();
    renderD();

  } catch (err) {
    console.error('[admin] rejectDoctor');
    toastM(tabibiT('toast_error_prefix','Erreur: ') + (err.message || tabibiT('toast_rejection_failed',"rejet échoué")), "error");
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  // ─── v10.6 : Attendre que le bridge synchronise tabibi_user ───
  async function waitForUser(maxMs){
    const t0 = Date.now();
    while (Date.now() - t0 < maxMs){
      let u = null;
      try { u = JSON.parse(localStorage.getItem("tabibi_user")||"null"); } catch(e){}
      if (u && u.role) return u;
      if (window.tabibi && window.tabibi.auth) {
        try {
          const session = await window.tabibi.auth.getSession();
          if (session) {
            const su = await window.tabibi.auth.getUser();
            if (su) {
              const fn = su.first_name || '';
              const ln = su.last_name || '';
              const name = (fn + ' ' + ln).trim() || (su.email||'').split('@')[0];
              const parts = name.split(/\s+/);
              const initials = ((parts[0]||'?')[0] + (parts[1]?parts[1][0]:'')).toUpperCase();
              const role = (su.role === 'doctor' || su.role === 'medecin') ? 'medecin' : (su.role === 'admin' ? 'admin' : 'patient');
              const userObj = { id: su.id, email: su.email, role, name, initials, firstName: fn, lastName: ln };
              localStorage.setItem('tabibi_user', JSON.stringify(userObj));
              return userObj;
            }
          } else { return null; }
        } catch(e){}
      }
      await new Promise(r => setTimeout(r, 100));
    }
    return null;
  }

  const u = await waitForUser(3000);
  if (!u || u.role !== "admin") {
    location.href = "login.html";
    return;
  }

  // Check Supabase serveur (sécurité)
  try {
    if (window.tabibi && window.tabibi.auth) {
      const session = await window.tabibi.auth.getSession();
      if (!session) {
        localStorage.removeItem("tabibi_user");
        localStorage.removeItem("tabibi_role");
        location.href = "login.html";
        return;
      }
      const serverUser = await window.tabibi.auth.getUser();
      if (!serverUser || serverUser.role !== "admin" || serverUser.status !== "active") {
        await window.tabibi.auth.signOut();
        location.href = "login.html";
        return;
      }
    }
  } catch (e) {
    console.warn("[admin] Server check failed");
    location.href = "login.html";
    return;
  }

  document.getElementById("user-init").textContent = u.initials || "AT";
  renderOverview();
});

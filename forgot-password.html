<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script><script src="js/tabibi-security.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="description" content="Reinitialisez votre mot de passe Tabibi en quelques secondes.">
<link rel="canonical" href="https://tabibi.doctor/forgot-password.html">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0F7560">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon-192.png">
<title>Mot de passe oublié | Tabibi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  body { background:linear-gradient(135deg,#f0f9ff 0%,#fff 100%); min-height:100vh; }
  .auth-wrap { max-width:440px; margin:48px auto; padding:32px 24px; background:#fff; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.06); }
  .auth-hd { text-align:center; margin-bottom:24px; }
  .auth-hd i { font-size:36px; color:var(--blue); margin-bottom:12px; }
  .auth-hd h1 { font-size:22px; font-weight:800; margin:0 0 6px; color:var(--text); }
  .auth-hd p { font-size:13px; color:var(--text3); margin:0; }
  .btn-back { display:inline-flex; align-items:center; gap:6px; font-size:13px; color:var(--text3); text-decoration:none; margin-bottom:16px; }
  .msg-ok { background:#dcfce7; color:#166534; padding:12px 14px; border-radius:10px; font-size:13px; margin-top:14px; display:none; }
  .msg-err { background:#fee2e2; color:#991b1b; padding:12px 14px; border-radius:10px; font-size:13px; margin-top:14px; display:none; }
</style>
</head>
<body>
<div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:9999"></div>

<div class="auth-wrap">
  <a href="login.html" class="btn-back"><i class="fa fa-arrow-left"></i> <span data-i18n="back_login">Retour connexion</span></a>

  <div class="auth-hd">
    <i class="fa fa-key"></i>
    <h1 data-i18n="title">Mot de passe oublié ?</h1>
    <p data-i18n="subtitle">Saisissez votre email — nous vous enverrons un lien de réinitialisation.</p>
  </div>

  <form id="forgot-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="f_email" data-i18n="email_label">Email</label>
      <input
        class="form-control"
        id="f_email"
        type="email"
        autocomplete="email"
        required
        placeholder="vous@example.com"
        data-i18n-placeholder="email_ph">
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
      <i class="fa fa-paper-plane"></i> <span data-i18n="send_btn">Envoyer le lien</span>
    </button>

    <div class="msg-ok" id="msg-ok" data-i18n="msg_ok">
      Si un compte existe avec cet email, vous recevrez un lien dans quelques minutes. Pensez à vérifier vos spams.
    </div>
    <div class="msg-err" id="msg-err"></div>
  </form>

  <p style="text-align:center;font-size:12px;color:var(--text3);margin-top:20px">
    <span data-i18n="no_account">Pas encore de compte ?</span>
    <a href="signup.html" style="color:var(--blue);font-weight:600" data-i18n="signup_link">Inscription</a>
  </p>
</div>

<script>
function toastM(m,t){const c=document.getElementById("toast-container");if(!c)return;const col={success:"#10b981",error:"#ef4444",info:"#0F7560"};const d=document.createElement("div");d.style.cssText="background:"+(col[t]||col.info)+";color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.15);margin-bottom:8px";d.textContent=m;c.appendChild(d);setTimeout(()=>{d.parentNode&&d.parentNode.removeChild(d)},3500);}

document.getElementById('forgot-form').addEventListener('submit', async function(ev){
  ev.preventDefault();
  var emailEl = document.getElementById('f_email');
  var btn = document.getElementById('submit-btn');
  var okBox = document.getElementById('msg-ok');
  var errBox = document.getElementById('msg-err');
  okBox.style.display = 'none';
  errBox.style.display = 'none';

  var email = (emailEl.value || '').trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    errBox.textContent = 'Email invalide.';
    errBox.style.display = 'block';
    return;
  }

  var sb = window.tabibi && window.tabibi.supabase;
  if (!sb) {
    errBox.textContent = 'Client non initialise. Rechargez la page.';
    errBox.style.display = 'block';
    return;
  }

  var origHtml = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Envoi...';

  var siteUrl = (window.TABIBI_CONFIG && window.TABIBI_CONFIG.SITE_URL) || window.location.origin;
  var redirectTo = siteUrl.replace(/\/$/, '') + '/reset-password.html';

  try {
    var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: redirectTo });
    // On affiche TOUJOURS le meme message (anti-enumeration)
    okBox.style.display = 'block';
    emailEl.value = '';
    if (r && r.error) {
      // Logger en silence, ne pas devoiler
      console.warn('[forgot] reset error', r.error);
    }
  } catch (e) {
    console.error('[forgot] exception', e);
    // Meme message generique pour ne pas devoiler l'existence du compte
    okBox.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.innerHTML = origHtml;
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/tabibi-bridge.js"></script>
<script src="js/tabibi-cookies.js"></script>
<script src="js/tabibi-lang.js"></script>
<script src="js/tabibi-i18n.js"></script>
<script src="js/tabibi-sentry.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script><script src="js/tabibi-security.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="description" content="Validation des médecins — Administration Tabibi.">
<link rel="canonical" href="https://tabibi.doctor/admin-doctor-validation.html">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#7c3aed">
<link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="images/icon-192.png">
<title>Validation médecins | Admin Tabibi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
<style>
.dv-tabs{position:sticky;top:var(--nav-h);z-index:150;background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.dv-tab{flex-shrink:0;padding:14px 18px;font-size:13px;font-weight:700;color:var(--text2);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;white-space:nowrap}
.dv-tab.active{color:#7c3aed;border-bottom-color:#7c3aed}
.dv-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:20px;height:20px;border-radius:10px;font-size:11px;padding:0 5px;margin-left:6px;font-weight:800}
.dv-cnt.p{background:#fef3c7;color:#92400e}
.dv-cnt.a{background:#dcfce7;color:#166534}
.dv-cnt.r{background:#fee2e2;color:#991b1b}
.dv-filters{padding:10px 16px;display:flex;gap:8px;align-items:center;background:#fff;border-bottom:1px solid var(--bg2)}
.dv-search{flex:1;min-width:0;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px}
.dv-search:focus{outline:none;border-color:#7c3aed}
.dv-wsel{padding:9px 8px;border:1.5px solid var(--border);border-radius:10px;font-size:12px;background:#fff;max-width:120px}
.dv-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
.dv-card.p-card{border-left:3px solid #f59e0b}
.dv-card.r-card{border-left:3px solid #ef4444}
.dv-hdr{display:flex;gap:12px;align-items:flex-start}
.dv-avi{width:50px;height:50px;border-radius:12px;object-fit:cover;flex-shrink:0}
.dv-ini{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0;background:#ede9fe;color:#7c3aed}
.dv-name{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px}
.dv-meta{font-size:12px;color:var(--text2);line-height:1.5}
.dv-badges{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 10px}
.dv-docs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.dv-doc-btn{font-size:12px;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:5px;transition:.15s}
.dv-doc-btn:hover:not(:disabled){border-color:#7c3aed;color:#7c3aed;background:#f5f3ff}
.dv-doc-btn:disabled{opacity:.4;cursor:not-allowed}
.dv-acts{display:flex;gap:8px;margin-top:4px}
.btn-val{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s;background:#dcfce7;color:#166534;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-val:hover:not([disabled]){background:#166534;color:#fff}
.btn-val[disabled]{opacity:.4;cursor:not-allowed}
.btn-rej{flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:.15s;background:#fee2e2;color:#991b1b;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-rej:hover{background:#991b1b;color:#fff}
.btn-aud{padding:10px 12px;border-radius:10px;font-size:12px;cursor:pointer;border:none;transition:.15s;background:var(--bg2);color:var(--text2);display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-aud:hover{background:#ede9fe;color:#7c3aed}
.rej-box{background:#fef2f2;border-radius:10px;padding:12px 14px;margin-top:10px;font-size:12px;color:#991b1b;line-height:1.5}
.dv-pg{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 0}
.dv-pg-btn{padding:8px 16px;border-radius:10px;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:.15s}
.dv-pg-btn:hover:not(:disabled){border-color:#7c3aed;color:#7c3aed}
.dv-pg-btn:disabled{opacity:.4;cursor:not-allowed}
.dv-bk{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:900;display:none}
.dv-bk.on{display:block}
.dv-modal{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;background:#fff;border-radius:24px 24px 0 0;z-index:901;padding:24px 20px 32px;max-height:85vh;overflow-y:auto;display:none}
.dv-modal.on{display:block}
.m-title{font-size:17px;font-weight:800;margin-bottom:16px}
.m-doc{font-size:14px;font-weight:700;color:#7c3aed;background:#f5f3ff;padding:10px 14px;border-radius:10px;margin-bottom:16px}
.chklist label{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--bg2);font-size:14px;cursor:pointer}
.chklist label:last-child{border-bottom:none}
.chklist input[type=checkbox]{width:18px;height:18px;accent-color:#0F7560;flex-shrink:0}
.preset-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.preset{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:#fff;cursor:pointer;transition:.15s}
.preset:hover,.preset.sel{border-color:#ef4444;color:#ef4444;background:#fef2f2}
.ta-reason{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;resize:vertical;min-height:90px;font-family:inherit;box-sizing:border-box}
.ta-reason:focus{outline:none;border-color:#ef4444}
.char-c{font-size:11px;color:var(--text3);text-align:right;margin:4px 0 14px}
.char-c.ok{color:var(--green)}
.aud-tbl{width:100%;font-size:12px;border-collapse:collapse;margin-top:12px}
.aud-tbl th{text-align:left;padding:8px;border-bottom:2px solid var(--bg2);color:var(--text3);font-weight:700}
.aud-tbl td{padding:8px;border-bottom:1px solid var(--bg2);vertical-align:top}
.aud-tbl tr:last-child td{border-bottom:none}
.skel{background:var(--bg2);border-radius:8px;animation:sk .9s ease-in-out infinite alternate}
@keyframes sk{from{opacity:.5}to{opacity:1}}
.dv-empty{text-align:center;padding:48px 20px;color:var(--text2)}
.dv-empty i{font-size:48px;margin-bottom:16px;opacity:.3;display:block}
</style>
</head>
<body>
<div class="app-root">

<header class="app-bar">
  <a href="admin-dashboard.html" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:rgba(0,0,0,.04);color:var(--text2);text-decoration:none;flex-shrink:0;transition:.15s" onmouseover="this.style.background='var(--blue-l)';this.style.color='var(--blue)'" onmouseout="this.style.background='rgba(0,0,0,.04)';this.style.color='var(--text2)'"><i class="fa fa-arrow-left"></i></a>
  <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0">
    <div style="width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;box-shadow:0 2px 8px rgba(124,58,237,.3)"><i class="fa fa-user-doctor"></i></div>
    <div style="flex:1;min-width:0">
      <div class="app-bar-title" style="font-size:15px;font-weight:800;color:var(--text);line-height:1.1">Validation médecins</div>
      <div id="adm-sub" style="font-size:11px;color:var(--text3);margin-top:2px"><i class="fa fa-shield fa-xs" style="color:#7c3aed"></i> Admin Tabibi</div>
    </div>
  </div>
  <button id="user-pill" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff;font-weight:800;font-size:13px;border:none;cursor:default;flex-shrink:0;display:flex;align-items:center;justify-content:center" title="Mon compte"><span id="user-init">AT</span></button>
</header>

<div class="dv-tabs" role="tablist">
  <button class="dv-tab active" role="tab" onclick="switchTab('pending',this)"><i class="fa fa-clock"></i> En attente<span class="dv-cnt p" id="cnt-p">–</span></button>
  <button class="dv-tab" role="tab" onclick="switchTab('approved',this)"><i class="fa fa-circle-check"></i> Validés<span class="dv-cnt a" id="cnt-a">–</span></button>
  <button class="dv-tab" role="tab" onclick="switchTab('rejected',this)"><i class="fa fa-circle-xmark"></i> Rejetés<span class="dv-cnt r" id="cnt-r">–</span></button>
</div>

<div class="dv-filters">
  <input class="dv-search" id="dv-search" type="search" placeholder="Nom ou email..." oninput="onSearch()">
  <select class="dv-wsel" id="dv-wilaya" onchange="onWilaya()"><option value="">Toutes wilayas</option></select>
</div>

<main class="page" role="main" style="padding:12px 16px">
  <div id="dv-list"></div>
  <div id="dv-pg"></div>
</main>

<!-- Backdrop -->
<div class="dv-bk" id="dv-bk" onclick="closeModals()"></div>

<!-- Modal: Valider -->
<div class="dv-modal" id="m-val" role="dialog" aria-modal="true">
  <div class="m-title"><i class="fa fa-circle-check" style="color:#10b981"></i> Confirmer la validation</div>
  <div class="m-doc" id="mv-name"></div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Cochez les 3 points avant de valider :</p>
  <div class="chklist">
    <label><input type="checkbox" id="chk1" onchange="updValBtn()"> Carte de l'Ordre des Médecins vérifiée et authentique</label>
    <label><input type="checkbox" id="chk2" onchange="updValBtn()"> Pièce d'identité vérifiée et concordante avec le nom</label>
    <label><input type="checkbox" id="chk3" onchange="updValBtn()"> N° Ordre concordant avec la carte Ordre présentée</label>
  </div>
  <div style="display:flex;gap:10px;margin-top:20px">
    <button class="btn btn-ghost btn-lg" style="flex:1" onclick="closeModals()">Annuler</button>
    <button class="btn btn-lg" id="btn-val" style="flex:1;background:#10b981;color:#fff;opacity:.5;cursor:not-allowed" disabled onclick="doValidate()"><i class="fa fa-check"></i> Valider</button>
  </div>
</div>

<!-- Modal: Rejeter -->
<div class="dv-modal" id="m-rej" role="dialog" aria-modal="true">
  <div class="m-title" style="color:#991b1b"><i class="fa fa-circle-xmark"></i> Rejeter le dossier</div>
  <div class="m-doc" id="mr-name"></div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:10px">Motif du rejet (visible par le médecin) :</p>
  <div class="preset-wrap">
    <button class="preset" onclick="setPreset(this,'Documents illisibles ou de mauvaise qualité')">Documents illisibles</button>
    <button class="preset" onclick="setPreset(this,'N° Ordre invalide ou non trouvé dans le registre')">N° Ordre invalide</button>
    <button class="preset" onclick="setPreset(this,'Identité non concordante avec la carte Ordre')">Identité non concordante</button>
    <button class="preset" onclick="setPreset(this,'Documents manquants : carte Ordre et/ou pièce d\'identité')">Documents manquants</button>
  </div>
  <textarea class="ta-reason" id="ta-rej" placeholder="Décrivez précisément le motif du rejet..." oninput="onReason()"></textarea>
  <div class="char-c" id="char-c">0 / 20 caractères minimum</div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-ghost btn-lg" style="flex:1" onclick="closeModals()">Annuler</button>
    <button class="btn btn-lg" id="btn-rej" style="flex:1;background:#ef4444;color:#fff;opacity:.5;cursor:not-allowed" disabled onclick="doReject()"><i class="fa fa-xmark"></i> Confirmer le rejet</button>
  </div>
</div>

<!-- Modal: Audit -->
<div class="dv-modal" id="m-aud" role="dialog" aria-modal="true">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div class="m-title" style="margin-bottom:0"><i class="fa fa-clock-rotate-left" style="color:#7c3aed"></i> Historique admin</div>
    <button onclick="closeModals()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text2)"><i class="fa fa-xmark"></i></button>
  </div>
  <div class="m-doc" id="ma-name"></div>
  <div id="aud-body"></div>
</div>

<div id="toast-container" role="region" aria-live="assertive" style="position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;width:calc(100% - 32px);max-width:440px"></div>

<script>
// ─── Utils ───────────────────────────────────────────────────
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function escA(s){return String(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');}
function toastM(m,t){const c=document.getElementById('toast-container');if(!c)return;const col={success:'#10b981',error:'#ef4444',info:'#7c3aed',warn:'#f59e0b'};const d=document.createElement('div');d.style.cssText=`background:${col[t]||'#0F7560'};color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;margin-bottom:8px;box-shadow:0 8px 28px rgba(0,0,0,.15);text-align:center`;d.textContent=String(m==null?'':m);c.appendChild(d);setTimeout(()=>d.remove(),3500);}
function fmtD(iso){if(!iso)return'–';try{return new Date(iso).toLocaleDateString('fr-DZ',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return iso;}}

// ─── State ───────────────────────────────────────────────────
const PS=20;
let _tab='pending',_page=0,_search='',_wilaya='';
let _specs=new Map(),_wils=new Map();
let _act=null; // {id,name,email} for current modal
let _isSA=false,_busy=false;

// ─── Tab / filter ────────────────────────────────────────────
function switchTab(tab,btn){_tab=tab;_page=0;document.querySelectorAll('.dv-tab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');loadList();}
let _st=null;
function onSearch(){_search=(document.getElementById('dv-search').value||'').trim();_page=0;clearTimeout(_st);_st=setTimeout(loadList,350);}
function onWilaya(){_wilaya=document.getElementById('dv-wilaya').value||'';_page=0;loadList();}

// ─── Ref data ─────────────────────────────────────────────────
async function loadRefs(){
  const sb=window.tabibi&&window.tabibi.supabase;if(!sb)return;
  try{
    const[sr,wr]=await Promise.all([
      sb.from('specialties').select('id,name_fr').order('name_fr'),
      sb.from('wilayas').select('code,name_fr').order('code')
    ]);
    (sr.data||[]).forEach(s=>_specs.set(s.id,s.name_fr));
    const sel=document.getElementById('dv-wilaya');
    (wr.data||[]).forEach(w=>{
      _wils.set(String(w.code),w.name_fr);
      const o=document.createElement('option');
      o.value=w.code;o.textContent=w.name_fr||('W.'+w.code);
      sel.appendChild(o);
    });
  }catch(e){console.warn('[dv] loadRefs:',e);}
}

// ─── Counts ───────────────────────────────────────────────────
async function loadCounts(){
  const sb=window.tabibi&&window.tabibi.supabase;if(!sb)return;
  try{
    const[p,a,r]=await Promise.all([
      sb.from('doctor_profiles').select('id',{count:'exact',head:true}).eq('validation_status','pending').eq('is_claimed',true),
      sb.from('doctor_profiles').select('id',{count:'exact',head:true}).eq('validation_status','approved'),
      sb.from('doctor_profiles').select('id',{count:'exact',head:true}).eq('validation_status','rejected')
    ]);
    document.getElementById('cnt-p').textContent=p.count??0;
    document.getElementById('cnt-a').textContent=a.count??0;
    document.getElementById('cnt-r').textContent=r.count??0;
  }catch(e){console.warn('[dv] loadCounts:',e);}
}

// ─── Query builder ────────────────────────────────────────────
function bq(sb,head){
  let q=sb.from('doctor_profiles').select(
    head?'id':'id,full_name,email,phone,photo_url,wilaya_code,specialty_id,claimed_at,source,legacy_id,ordre_card_path,id_card_path,validation_rejected_reason,validation_rejected_at,validation_approved_at',
    head?{count:'exact',head:true}:{}
  ).eq('validation_status',_tab);
  if(_tab==='pending')q=q.eq('is_claimed',true);
  if(_search)q=q.or(`full_name.ilike.%${_search}%,email.ilike.%${_search}%`);
  if(_wilaya)q=q.eq('wilaya_code',Number(_wilaya)||_wilaya);
  return q;
}

// ─── List load ────────────────────────────────────────────────
async function loadList(){
  if(_busy)return;_busy=true;
  const lEl=document.getElementById('dv-list'),pEl=document.getElementById('dv-pg');
  lEl.innerHTML=skelHtml();pEl.innerHTML='';
  const sb=window.tabibi&&window.tabibi.supabase;
  if(!sb){lEl.innerHTML='<div class="dv-empty"><i class="fa fa-plug"></i>Supabase indisponible</div>';_busy=false;return;}
  try{
    const start=_page*PS,end=start+PS-1;
    const[{data,error},{count:tot}]=await Promise.all([
      bq(sb,false).order('claimed_at',{ascending:_tab==='pending'}).range(start,end),
      bq(sb,true)
    ]);
    if(error)throw error;
    if(!data||!data.length){lEl.innerHTML=emptyHtml();_busy=false;return;}
    lEl.innerHTML=data.map(renderCard).join('');
    renderPg(pEl,tot??0);
  }catch(e){
    console.error('[dv] loadList:',e);
    lEl.innerHTML=`<div class="dv-empty"><i class="fa fa-triangle-exclamation"></i>${esc(e.message||'Erreur chargement')}</div>`;
  }
  _busy=false;
}

function skelHtml(){return Array(3).fill('').map(()=>`<div class="dv-card" style="margin-bottom:10px"><div style="display:flex;gap:12px"><div class="skel" style="width:50px;height:50px;border-radius:12px;flex-shrink:0"></div><div style="flex:1"><div class="skel" style="height:14px;width:55%;margin-bottom:8px;border-radius:6px"></div><div class="skel" style="height:12px;width:80%;border-radius:6px"></div></div></div></div>`).join('');}
function emptyHtml(){const m={pending:{i:'fa-clock',t:'Aucun médecin en attente de validation'},approved:{i:'fa-circle-check',t:'Aucun médecin validé'},rejected:{i:'fa-circle-xmark',t:'Aucun médecin rejeté'}}[_tab]||{i:'fa-inbox',t:'Aucun résultat'};return`<div class="dv-empty"><i class="fa ${m.i}"></i>${m.t}</div>`;}

// ─── Card renderer ────────────────────────────────────────────
function renderCard(d){
  const id=d.id;
  const name=d.full_name||d.email||'Sans nom';
  const ini=name.split(/\s+/).filter(Boolean).slice(-2).map(x=>x[0]||'').join('').toUpperCase()||'?';
  const spec=_specs.get(d.specialty_id)||'–';
  const wil=_wils.get(String(d.wilaya_code))||(d.wilaya_code?'W.'+d.wilaya_code:'–');
  const srcBadge=d.source==='signup'
    ?'<span class="badge badge-blue" style="font-size:10px">Signup</span>'
    :'<span style="font-size:10px;background:#f3f4f6;color:#6b7280;padding:2px 7px;border-radius:6px">Scrapé</span>';
  const clDate=d.claimed_at?`<span style="font-size:11px;color:var(--text3)"><i class="fa fa-calendar-check fa-xs"></i> ${fmtD(d.claimed_at)}</span>`:'';
  const hasO=!!d.ordre_card_path,hasI=!!d.id_card_path,hasDocs=hasO&&hasI;

  const docsHtml=`<div class="dv-docs">
    <button class="dv-doc-btn" onclick="prevDoc('${escA(id)}','ordre')" ${hasO?'':'disabled'}>
      <i class="fa fa-id-card"></i> Carte Ordre${hasO?'':' <span style="color:#ef4444;font-size:10px">(manquant)</span>'}
    </button>
    <button class="dv-doc-btn" onclick="prevDoc('${escA(id)}','id')" ${hasI?'':'disabled'}>
      <i class="fa fa-passport"></i> Pièce identité${hasI?'':' <span style="color:#ef4444;font-size:10px">(manquant)</span>'}
    </button>
  </div>`;

  let actsHtml='';
  if(_tab==='pending'){
    actsHtml=`<div class="dv-acts">
      <button class="btn-val" ${hasDocs?'':'disabled title="Uploadez les 2 documents avant de valider"'} onclick="openVal('${escA(id)}','${escA(name)}','${escA(d.email||'')}')">
        <i class="fa fa-check"></i> Valider${hasDocs?'':' <i class="fa fa-lock fa-xs"></i>'}
      </button>
      <button class="btn-rej" onclick="openRej('${escA(id)}','${escA(name)}','${escA(d.email||'')}')"><i class="fa fa-xmark"></i> Rejeter</button>
      <button class="btn-aud" onclick="openAud('${escA(id)}','${escA(name)}')"><i class="fa fa-clock-rotate-left"></i></button>
    </div>`;
  }else if(_tab==='approved'){
    actsHtml=`<div class="dv-acts">
      <button class="btn-rej" onclick="openRej('${escA(id)}','${escA(name)}','${escA(d.email||'')}')"><i class="fa fa-xmark"></i> Révoquer</button>
      <button class="btn-aud" onclick="openAud('${escA(id)}','${escA(name)}')"><i class="fa fa-clock-rotate-left"></i> Historique</button>
    </div>`;
  }else{
    actsHtml=`<div class="dv-acts">
      <button class="btn-aud" onclick="openAud('${escA(id)}','${escA(name)}')"><i class="fa fa-clock-rotate-left"></i> Historique</button>
    </div>`;
  }

  const rejBox=(_tab==='rejected'&&d.validation_rejected_reason)
    ?`<div class="rej-box"><strong>Motif :</strong> ${esc(d.validation_rejected_reason)}<br><span style="font-size:10px;opacity:.7">Rejeté le ${fmtD(d.validation_rejected_at)}</span></div>`:'';

  const missBadge=(!hasDocs&&_tab==='pending')
    ?'<span style="font-size:10px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:6px"><i class="fa fa-triangle-exclamation fa-xs"></i> Docs manquants</span>':'';

  const cc=_tab==='pending'?'p-card':_tab==='rejected'?'r-card':'';

  return `<div class="dv-card ${cc}">
    <div class="dv-hdr">
      ${d.photo_url?`<img class="dv-avi" src="${esc(d.photo_url)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'' }
      <div class="dv-ini" style="${d.photo_url?'display:none':''}"> ${esc(ini)}</div>
      <div style="flex:1;min-width:0">
        <div class="dv-name">${esc(name)}</div>
        <div class="dv-meta">${esc(spec)} · ${esc(wil)}<br>
          <i class="fa fa-envelope fa-xs"></i> ${esc(d.email||'–')}${d.phone?` · <i class="fa fa-phone fa-xs"></i> ${esc(d.phone)}`:''}
        </div>
      </div>
    </div>
    <div class="dv-badges">
      ${srcBadge}${clDate}
      ${d.legacy_id?`<span style="font-size:10px;color:var(--text3)">ID: ${esc(String(d.legacy_id))}</span>`:''}
      ${missBadge}
    </div>
    ${docsHtml}${rejBox}${actsHtml}
  </div>`;
}

// ─── Pagination ───────────────────────────────────────────────
function renderPg(el,tot){
  if(tot<=PS){el.innerHTML='';return;}
  const tp=Math.ceil(tot/PS),cur=_page+1;
  el.innerHTML=`<div class="dv-pg">
    <button class="dv-pg-btn" onclick="goPage(${_page-1})" ${_page===0?'disabled':''}><i class="fa fa-chevron-left"></i> Précédent</button>
    <span style="font-size:13px;color:var(--text2)">Page ${cur} / ${tp}</span>
    <button class="dv-pg-btn" onclick="goPage(${_page+1})" ${cur>=tp?'disabled':''}>Suivant <i class="fa fa-chevron-right"></i></button>
  </div>`;
}
function goPage(p){_page=p;loadList();window.scrollTo(0,0);}

// ─── Signed URL preview ───────────────────────────────────────
async function prevDoc(docId,type){
  const sb=window.tabibi&&window.tabibi.supabase;
  if(!sb){toastM('Supabase indisponible','error');return;}
  try{
    const{data,error}=await sb.from('doctor_profiles').select('ordre_card_path,id_card_path').eq('id',docId).single();
    if(error||!data)throw error||new Error('Médecin introuvable');
    const path=type==='ordre'?data.ordre_card_path:data.id_card_path;
    if(!path){toastM('Document non uploadé','warn');return;}
    const{data:u,error:ue}=await sb.storage.from('doctor-docs').createSignedUrl(path,60);
    if(ue)throw ue;
    window.open(u.signedUrl,'_blank','noopener');
  }catch(e){
    console.error('[dv] prevDoc:',e);
    toastM('Erreur ouverture : '+(e.message||'inconnue'),'error');
  }
}

// ─── Modal utils ──────────────────────────────────────────────
function openM(id){document.getElementById('dv-bk').classList.add('on');document.getElementById(id).classList.add('on');document.body.style.overflow='hidden';}
function closeModals(){document.getElementById('dv-bk').classList.remove('on');document.querySelectorAll('.dv-modal').forEach(m=>m.classList.remove('on'));document.body.style.overflow='';_act=null;}

// ─── Validate modal ───────────────────────────────────────────
function openVal(id,name,email){
  _act={id,name,email};
  document.getElementById('mv-name').textContent=name;
  ['chk1','chk2','chk3'].forEach(c=>{document.getElementById(c).checked=false;});
  const b=document.getElementById('btn-val');b.disabled=true;b.style.opacity='.5';b.style.cursor='not-allowed';
  openM('m-val');
}
function updValBtn(){
  const ok=['chk1','chk2','chk3'].every(c=>document.getElementById(c).checked);
  const b=document.getElementById('btn-val');
  b.disabled=!ok;b.style.opacity=ok?'1':'.5';b.style.cursor=ok?'pointer':'not-allowed';
}
async function doValidate(){
  if(!_act)return;
  const{id,name,email}=_act;
  const b=document.getElementById('btn-val');
  b.disabled=true;b.innerHTML='<i class="fa fa-spinner fa-spin"></i> Validation...';
  const sb=window.tabibi&&window.tabibi.supabase;
  if(!sb){toastM('Supabase indisponible','error');return;}
  try{
    const{error}=await sb.rpc('admin_validate_doctor',{p_doctor_id:id,p_action:'validate',p_reason:null});
    if(error)throw error;
    if(window.tabibiBrevo){
      try{
        const fn=name.replace(/^dr\.?\s*/i,'').split(' ')[0]||name;
        await window.tabibiBrevo.sendEmail('medecin_validated',email,{firstName:fn,lang:'fr'});
      }catch(e){console.warn('[dv] Brevo medecin_validated:',e);}
    }
    closeModals();
    toastM(name+' validé avec succès','success');
    await Promise.all([loadCounts(),loadList()]);
  }catch(e){
    console.error('[dv] doValidate:',e);
    toastM('Erreur validation : '+(e.message||'inconnue'),'error');
    b.disabled=false;b.style.opacity='1';b.style.cursor='pointer';
    b.innerHTML='<i class="fa fa-check"></i> Valider';
  }
}

// ─── Reject modal ─────────────────────────────────────────────
function openRej(id,name,email){
  _act={id,name,email};
  document.getElementById('mr-name').textContent=name;
  document.getElementById('ta-rej').value='';
  document.getElementById('char-c').textContent='0 / 20 caractères minimum';
  document.getElementById('char-c').classList.remove('ok');
  const b=document.getElementById('btn-rej');b.disabled=true;b.style.opacity='.5';b.style.cursor='not-allowed';
  document.querySelectorAll('.preset').forEach(p=>p.classList.remove('sel'));
  openM('m-rej');
}
function setPreset(btn,txt){
  document.querySelectorAll('.preset').forEach(p=>p.classList.remove('sel'));
  btn.classList.add('sel');
  document.getElementById('ta-rej').value=txt;
  onReason();
}
function onReason(){
  const v=(document.getElementById('ta-rej').value||'').trim();
  const ok=v.length>=20;
  const el=document.getElementById('char-c');
  el.textContent=v.length+' / 20 caractères minimum';
  el.classList.toggle('ok',ok);
  const b=document.getElementById('btn-rej');
  b.disabled=!ok;b.style.opacity=ok?'1':'.5';b.style.cursor=ok?'pointer':'not-allowed';
}
async function doReject(){
  if(!_act)return;
  const{id,name,email}=_act;
  const reason=(document.getElementById('ta-rej').value||'').trim();
  if(reason.length<20){toastM('Motif trop court (min. 20 caractères)','error');return;}
  const b=document.getElementById('btn-rej');
  b.disabled=true;b.innerHTML='<i class="fa fa-spinner fa-spin"></i> Rejet...';
  const sb=window.tabibi&&window.tabibi.supabase;
  if(!sb){toastM('Supabase indisponible','error');return;}
  try{
    const{error}=await sb.rpc('admin_validate_doctor',{p_doctor_id:id,p_action:'reject',p_reason:reason});
    if(error)throw error;
    if(window.tabibiBrevo){
      try{
        const fn=name.replace(/^dr\.?\s*/i,'').split(' ')[0]||name;
        await window.tabibiBrevo.sendEmail('medecin_rejected',email,{firstName:fn,reason,lang:'fr'});
      }catch(e){
        console.warn('[dv] Brevo medecin_rejected fallback',{doctor_id:id,email,reason});
      }
    }
    closeModals();
    toastM(name+' rejeté','info');
    await Promise.all([loadCounts(),loadList()]);
  }catch(e){
    console.error('[dv] doReject:',e);
    toastM('Erreur rejet : '+(e.message||'inconnue'),'error');
    b.disabled=false;b.style.opacity='1';b.style.cursor='pointer';
    b.innerHTML='<i class="fa fa-xmark"></i> Confirmer le rejet';
  }
}

// ─── Audit modal ──────────────────────────────────────────────
async function openAud(docId,docName){
  document.getElementById('ma-name').textContent=docName;
  document.getElementById('aud-body').innerHTML='<div style="text-align:center;padding:24px;color:var(--text3)"><i class="fa fa-spinner fa-spin"></i> Chargement...</div>';
  openM('m-aud');
  const sb=window.tabibi&&window.tabibi.supabase;
  if(!sb){document.getElementById('aud-body').innerHTML='<p style="color:var(--text3);font-size:13px">Supabase indisponible</p>';return;}
  try{
    const{data,error}=await sb.from('admin_actions')
      .select('created_at,action,reason,admin_id')
      .eq('target_id',docId)
      .order('created_at',{ascending:false})
      .limit(50);
    if(error)throw error;
    if(!data||!data.length){
      document.getElementById('aud-body').innerHTML='<div class="dv-empty" style="padding:24px 0"><i class="fa fa-clock-rotate-left"></i>Aucune action enregistrée</div>';
      return;
    }
    const rows=data.map(a=>`<tr>
      <td style="white-space:nowrap;font-size:11px">${fmtD(a.created_at)}</td>
      <td><span class="badge ${a.action==='validate'?'badge-green':a.action==='reject'?'badge-red':'badge-amber'}" style="font-size:10px">${esc(a.action)}</span></td>
      <td style="color:var(--text3);font-size:11px">${esc(a.reason||'–')}</td>
      <td style="color:var(--text3);font-size:10px">${esc((a.admin_id||'').substring(0,8)+'…')}</td>
    </tr>`).join('');
    document.getElementById('aud-body').innerHTML=`<table class="aud-tbl"><thead><tr><th>Date</th><th>Action</th><th>Motif</th><th>Admin</th></tr></thead><tbody>${rows}</tbody></table>`;
  }catch(e){
    console.error('[dv] openAud:',e);
    document.getElementById('aud-body').innerHTML=`<p style="color:#ef4444;font-size:13px">${esc(e.message||'Erreur historique')}</p>`;
  }
}

// ─── Auth guard (same pattern as admin-dashboard.html) ────────
async function waitForUser(ms){
  const t0=Date.now();
  while(Date.now()-t0<ms){
    let u=null;
    try{u=JSON.parse(localStorage.getItem('tabibi_user')||'null');}catch(e){}
    if(u&&u.role)return u;
    if(window.tabibi&&window.tabibi.auth){
      try{
        const sess=await window.tabibi.auth.getSession();
        if(sess){
          const su=await window.tabibi.auth.getUser();
          if(su){
            const fn=su.first_name||'',ln=su.last_name||'';
            const name=(fn+' '+ln).trim()||(su.email||'').split('@')[0];
            const parts=name.split(/\s+/);
            const init=((parts[0]||'?')[0]+(parts[1]?parts[1][0]:'')).toUpperCase();
            const role=(su.role==='doctor'||su.role==='medecin')?'medecin':(su.role==='admin'?'admin':'patient');
            const obj={id:su.id,email:su.email,role,name,initials:init};
            localStorage.setItem('tabibi_user',JSON.stringify(obj));
            return obj;
          }
        }else{return null;}
      }catch(e){}
    }
    await new Promise(r=>setTimeout(r,100));
  }
  return null;
}

document.addEventListener('DOMContentLoaded',async()=>{
  const u=await waitForUser(3000);
  if(!u||u.role!=='admin'){location.href='login.html';return;}

  try{
    if(window.tabibi&&window.tabibi.auth){
      const sess=await window.tabibi.auth.getSession();
      if(!sess){localStorage.removeItem('tabibi_user');location.href='login.html';return;}
      const sb=window.tabibi.supabase;
      const au=await window.tabibi.auth.getUser();
      if(!au){location.href='login.html';return;}
      const{data:meta,error:me}=await sb.from('users').select('role,is_super_admin,status').eq('id',au.id).single();
      if(me||!meta||meta.role!=='admin'||meta.status!=='active'){
        try{await window.tabibi.auth.signOut();}catch(e){}
        location.href='login.html';return;
      }
      _isSA=!!(meta.is_super_admin);
      if(_isSA){
        document.getElementById('adm-sub').innerHTML='<i class="fa fa-shield fa-xs" style="color:#7c3aed"></i> Super Admin <span style="background:#7c3aed;color:#fff;font-size:9px;padding:2px 6px;border-radius:5px;margin-left:4px;font-weight:800;vertical-align:middle">SUPER</span>';
      }
    }
  }catch(e){
    console.warn('[dv] server check:',e);
    location.href='login.html';return;
  }

  document.getElementById('user-init').textContent=u.initials||'AT';
  await Promise.all([loadRefs(),loadCounts()]);
  await loadList();
});

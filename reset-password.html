<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<script src="js/tabibi-prelang.js"></script><script src="js/tabibi-security.js"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="description" content="Definissez votre nouveau mot de passe Tabibi.">
<link rel="canonical" href="https://tabibi.doctor/reset-password.html">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#0F7560">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="images/icon-192.png">
<title>Nouveau mot de passe | Tabibi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/components.css">
<style>
  body { background:linear-gradient(135deg,#f0f9ff 0%,#fff 100%); min-height:100vh; }
  .auth-wrap { max-width:440px; margin:48px auto; padding:32px 24px; background:#fff; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,.06); }
  .auth-hd { text-align:center; margin-bottom:24px; }
  .auth-hd i { font-size:36px; color:var(--blue); margin-bottom:12px; }
  .auth-hd h1 { font-size:22px; font-weight:800; margin:0 0 6px; color:var(--text); }
  .auth-hd p { font-size:13px; color:var(--text3); margin:0; }
  .pwd-meter { height:6px; border-radius:3px; background:#eee; overflow:hidden; margin-top:8px; }
  .pwd-meter > span { display:block; height:100%; width:0; transition:width .2s, background .2s; }
  .pwd-hint { font-size:11px; color:var(--text3); margin-top:6px; }
  .msg-ok { background:#dcfce7; color:#166534; padding:12px 14px; border-radius:10px; font-size:13px; margin-top:14px; display:none; }
  .msg-err { background:#fee2e2; color:#991b1b; padding:12px 14px; border-radius:10px; font-size:13px; margin-top:14px; display:none; }
  .state-loading { text-align:center; padding:24px; color:var(--text3); }
</style>
</head>
<body>
<div id="toast-container" style="position:fixed;top:16px;right:16px;z-index:9999"></div>

<div class="auth-wrap">
  <div class="auth-hd">
    <i class="fa fa-lock"></i>
    <h1 data-i18n="title">Nouveau mot de passe</h1>
    <p data-i18n="subtitle">Choisissez un mot de passe robuste (min. 8 caractères, lettres + chiffres).</p>
  </div>

  <div id="loading" class="state-loading">
    <i class="fa fa-spinner fa-spin"></i> Verification du lien...
  </div>

  <form id="reset-form" novalidate style="display:none">
    <div class="form-group">
      <label class="form-label" for="f_pwd" data-i18n="pwd_label">Nouveau mot de passe</label>
      <input
        class="form-control"
        id="f_pwd"
        type="password"
        autocomplete="new-password"
        required
        minlength="8"
        placeholder="8 caracteres minimum">
      <div class="pwd-meter"><span id="pwd-bar"></span></div>
      <div class="pwd-hint" id="pwd-hint">Au moins 8 caractères, une lettre, un chiffre.</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="f_pwd2" data-i18n="pwd_confirm_label">Confirmer le mot de passe</label>
      <input
        class="form-control"
        id="f_pwd2"
        type="password"
        autocomplete="new-password"
        required
        minlength="8">
    </div>

    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
      <i class="fa fa-check"></i> <span data-i18n="save_btn">Définir le mot de passe</span>
    </button>

    <div class="msg-ok" id="msg-ok"></div>
    <div class="msg-err" id="msg-err"></div>
  </form>

  <div id="invalid-link" style="display:none">
    <div class="msg-err" style="display:block">
      Lien invalide ou expire. <a href="forgot-password.html" style="color:#991b1b;font-weight:700;text-decoration:underline">Renvoyer un lien</a>.
    </div>
  </div>
</div>

<script>
function toastM(m,t){const c=document.getElementById("toast-container");if(!c)return;const col={success:"#10b981",error:"#ef4444",info:"#0F7560"};const d=document.createElement("div");d.style.cssText="background:"+(col[t]||col.info)+";color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.15);margin-bottom:8px";d.textContent=m;c.appendChild(d);setTimeout(()=>{d.parentNode&&d.parentNode.removeChild(d)},3500);}

function scorePwd(p) {
  if (!p) return 0;
  var s = 0;
  if (p.length >= 8) s += 1;
  if (p.length >= 12) s += 1;
  if (/[a-z]/.test(p) && /[A-Z]/.test(p)) s += 1;
  if (/\d/.test(p)) s += 1;
  if (/[^A-Za-z0-9]/.test(p)) s += 1;
  return Math.min(s, 4);
}

document.getElementById('f_pwd').addEventListener('input', function(e){
  var s = scorePwd(e.target.value);
  var bar = document.getElementById('pwd-bar');
  var colors = ['#ef4444','#f59e0b','#f59e0b','#10b981','#059669'];
  bar.style.width = (s * 25) + '%';
  bar.style.background = colors[s];
});

(async function init() {
  var loading = document.getElementById('loading');
  var form = document.getElementById('reset-form');
  var invalid = document.getElementById('invalid-link');

  function waitForSupabase(retries) {
    return new Promise(function(resolve){
      var tries = 0;
      var iv = setInterval(function(){
        tries++;
        if (window.tabibi && window.tabibi.supabase) { clearInterval(iv); resolve(true); }
        else if (tries > retries) { clearInterval(iv); resolve(false); }
      }, 80);
    });
  }
  var ready = await waitForSupabase(40);
  if (!ready) {
    loading.style.display = 'none';
    invalid.style.display = 'block';
    return;
  }
  var sb = window.tabibi.supabase;

  // Supabase Auth v2: detection automatique du token dans le hash (#access_token=...)
  // si detectSessionInUrl etait active. Notre config.js l'a desactive, on parse manuellement.
  try {
    var hash = (window.location.hash || '').replace(/^#/, '');
    var params = new URLSearchParams(hash);
    var access = params.get('access_token');
    var refresh = params.get('refresh_token');
    var type = params.get('type');

    if (access && refresh) {
      var setRes = await sb.auth.setSession({ access_token: access, refresh_token: refresh });
      if (setRes.error) throw setRes.error;
      // Nettoyer le hash pour ne pas laisser les tokens dans l'URL
      history.replaceState(null, '', window.location.pathname + window.location.search);
    }

    // Verifier qu'on a bien une session
    var s = await sb.auth.getSession();
    if (!s || !s.data || !s.data.session) {
      loading.style.display = 'none';
      invalid.style.display = 'block';
      return;
    }
    loading.style.display = 'none';
    form.style.display = 'block';
  } catch (e) {
    console.error('[reset] session init', e);
    loading.style.display = 'none';
    invalid.style.display = 'block';
  }
})();

document.getElementById('reset-form').addEventListener('submit', async function(ev){
  ev.preventDefault();
  var pwd = document.getElementById('f_pwd').value;
  var pwd2 = document.getElementById('f_pwd2').value;
  var okBox = document.getElementById('msg-ok');
  var errBox = document.getElementById('msg-err');
  var btn = document.getElementById('submit-btn');
  okBox.style.display = 'none';
  errBox.style.display = 'none';

  if (!pwd || pwd.length < 8) {
    errBox.textContent = 'Mot de passe trop court (8 caracteres minimum).';
    errBox.style.display = 'block';
    return;
  }
  if (scorePwd(pwd) < 2) {
    errBox.textContent = 'Mot de passe trop faible. Ajoutez une majuscule, un chiffre.';
    errBox.style.display = 'block';
    return;
  }
  if (pwd !== pwd2) {
    errBox.textContent = 'Les mots de passe ne correspondent pas.';
    errBox.style.display = 'block';
    return;
  }

  var sb = window.tabibi && window.tabibi.supabase;
  if (!sb) { errBox.textContent = 'Client non initialise.'; errBox.style.display = 'block'; return; }

  var orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Enregistrement...';

  try {
    var r = await sb.auth.updateUser({ password: pwd });
    if (r.error) {
      errBox.textContent = r.error.message || 'Echec mise a jour. Reessayez.';
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = orig;
      return;
    }
    okBox.textContent = 'Mot de passe mis a jour. Redirection vers la connexion...';
    okBox.style.display = 'block';
    await sb.auth.signOut();
    var redir = (window.TABIBI_CONFIG && window.TABIBI_CONFIG.REDIRECTS && window.TABIBI_CONFIG.REDIRECTS.afterPasswordReset) || 'login.html';
    setTimeout(function(){ location.href = redir; }, 1500);
  } catch (e) {
    console.error('[reset] update', e);
    errBox.textContent = 'Erreur inattendue. Reessayez.';
    errBox.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = orig;
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/tabibi-bridge.js"></script>
<script src="js/tabibi-cookies.js"></script>
<script src="js/tabibi-lang.js"></script>
<script src="js/tabibi-i18n.js"></script>
<script src="js/tabibi-sentry.js"></script>
</body>
</html>

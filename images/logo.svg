<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 340" role="img" aria-label="Tabibi — Santé Confiance Algérie">
  <title>Tabibi</title>
  <desc>Caducée stylisé avec étoile DZ dans un carré arrondi vert</desc>

  <!-- Icon group -->
  <g transform="translate(180, 75)">
    <!-- Carré arrondi vert -->
    <rect x="0" y="0" width="120" height="120" fill="#0F7560" rx="20"/>
    <!-- Bâton central -->
    <rect x="56" y="28" width="8" height="70" fill="#FFFFFF" rx="2"/>
    <!-- Ailes -->
    <path d="M 42 35 Q 28 31 22 41 Q 30 38 42 41 Z" fill="#FFFFFF"/>
    <path d="M 78 35 Q 92 31 98 41 Q 90 38 78 41 Z" fill="#FFFFFF"/>
    <!-- Serpent stylisé -->
    <path d="M 60 38 Q 48 48 60 58 Q 72 68 60 78 Q 48 88 60 95" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <!-- Étoile DZ -->
    <g transform="translate(98, 22)">
      <polygon points="0,-9 2.5,-2.5 9,-2.5 3.5,2 5.5,9 0,4.5 -5.5,9 -3.5,2 -9,-2.5 -2.5,-2.5" fill="#D4A437"/>
    </g>
  </g>

  <!-- Wordmark Tabibi -->
  <g font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="600">
    <text x="340" y="130" fill="#1A1A1A">Tab</text>
    <text x="448" y="130" fill="#0F7560">i</text>
    <text x="466" y="130" fill="#1A1A1A">b</text>
    <text x="500" y="130" fill="#D4A437">i</text>
  </g>

  <!-- Baseline -->
  <text x="340" y="165" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666" letter-spacing="4">SANTÉ · CONFIANCE · ALGÉRIE</text>
</svg>

<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo Tabibi caducée dans carré arrondi</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Caducée stylisé avec étoile DZ dans un carré arrondi vert</desc>

<!-- Background card -->
<rect x="20" y="20" width="640" height="300" fill="#FAFAFA" rx="12" style="fill:rgb(250, 250, 250);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

<!-- ICON GROUP : carré arrondi (forme de la 2) -->
<g transform="translate(180, 75)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
  <!-- Carré arrondi vert (forme de la prop 2) -->
  <rect x="0" y="0" width="120" height="120" fill="#0F7560" rx="20" style="fill:rgb(15, 117, 96);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Caducée stylisé blanc (contenu de la prop 3) -->
  <!-- Bâton central -->
  <rect x="56" y="28" width="8" height="70" fill="#FFFFFF" rx="2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Ailes en haut (à gauche et à droite) -->
  <path d="M 42 35 Q 28 31 22 41 Q 30 38 42 41 Z" fill="#FFFFFF" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <path d="M 78 35 Q 92 31 98 41 Q 90 38 78 41 Z" fill="#FFFFFF" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Serpents stylisés (deux courbes entrelacées) -->
  <path d="M 60 38 Q 48 48 60 58 Q 72 68 60 78 Q 48 88 60 95" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" style="fill:none;stroke:rgb(255, 255, 255);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  
  <!-- Étoile DZ dorée en haut à droite -->
  <g transform="translate(98, 22)" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <polygon points="0,-9 2.5,-2.5 9,-2.5 3.5,2 5.5,9 0,4.5 -5.5,9 -3.5,2 -9,-2.5 -2.5,-2.5" fill="#D4A437" style="fill:rgb(212, 164, 55);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
</g>

<!-- TEXTE Tabibi (typo élégante de la 3) -->
<text x="340" y="130" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="600" fill="#1A1A1A" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:58px;font-weight:600;text-anchor:start;dominant-baseline:auto">Tab</text>
<text x="448" y="130" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="600" fill="#0F7560" style="fill:rgb(15, 117, 96);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:58px;font-weight:600;text-anchor:start;dominant-baseline:auto">i</text>
<text x="466" y="130" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="600" fill="#1A1A1A" style="fill:rgb(26, 26, 26);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:58px;font-weight:600;text-anchor:start;dominant-baseline:auto">b</text>
<text x="500" y="130" font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="600" fill="#D4A437" style="fill:rgb(212, 164, 55);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:58px;font-weight:600;text-anchor:start;dominant-baseline:auto">i</text>

<!-- Baseline -->
<text x="340" y="165" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="400" fill="#666666" letter-spacing="4" style="fill:rgb(102, 102, 102);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:13px;font-weight:400;text-anchor:start;dominant-baseline:auto">SANTÉ · CONFIANCE · ALGÉRIE</text>

<!-- Légende sous le logo -->
<text x="340" y="270" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#888888" text-anchor="middle" style="fill:rgb(136, 136, 136);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:13px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Caducée + étoile DZ dans carré arrondi vert</text>
<text x="340" y="290" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="400" fill="#AAAAAA" text-anchor="middle" style="fill:rgb(170, 170, 170);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, system-ui, sans-serif;font-size:11px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Vert profond #0F7560 · Or #D4A437</text>
</svg>
# ────────────────────────────────────────────────────────────────────────
# [Phase 3 2026-05-21] 301 redirects : anciennes URLs legales -> /legal/
# Preservation du SEO et compatibilite des liens externes (Conseil de
# l'Ordre, ANPDP, partenaires, emails Brevo historiques, etc.)
# A garder en place AU MOINS 12 mois apres mise en prod.
# ────────────────────────────────────────────────────────────────────────

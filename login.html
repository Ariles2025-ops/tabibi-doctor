<script>
function togglePw(id,btn){const i=document.getElementById(id);const t=i.type==="password";i.type=t?"text":"password";btn.querySelector("i").className=t?"fa fa-eye-slash":"fa fa-eye";}

// ═══════════════════════════════════════════════════════════════════
// SÉCURITÉ v10 : COMPTES DÉMO HARDCODÉS SUPPRIMÉS
// ═══════════════════════════════════════════════════════════════════
// L'authentification se fait exclusivement via Supabase Auth.
// Les anciens comptes de démo ont été retirés du code source.
// Tous les comptes (admin, patient test, médecin test) sont stockés
// uniquement dans la base de données Supabase, jamais en clair dans le code.
// ═══════════════════════════════════════════════════════════════════

function normalizeRole(r){
  if(!r) return "patient";
  const s=String(r).toLowerCase().trim();
  if(s==="doctor"||s==="médecin"||s==="medecin") return "medecin";
  if(s==="admin"||s==="administrator") return "admin";
  return "patient";
}

// [Phase 5.2.3] Support du param ?next= pour retour post-login.
// Utilisé par reservation.html auth-wall (ERR_AUTH_REQUIRED) pour
// renvoyer l'user sur sa page de booking après authentification.
// Validation stricte : whitelist redirections internes uniquement
// (open-redirect = vecteur phishing). Refuse :
//   - URLs absolues (http://, https://, javascript:, data:, etc.)
//   - URLs protocol-relative (//evil.com)
//   - URLs contenant backslash (\\evil.com sur certains navigateurs)
// Accepte :
//   - paths commençant par '/' (ex: /reservation.html?doctor_id=...)
//   - paths relatifs sans schéma (ex: reservation.html?doctor_id=...)
function _safeNext(){
  try {
    var u = new URL(location.href);
    var n = u.searchParams.get('next');
    if (!n) return null;
    if (n.indexOf('://') !== -1) return null;       // absolute scheme
    if (n.charAt(0) === '/' && n.charAt(1) === '/') return null; // //evil.com
    if (n.indexOf('\\') !== -1) return null;        // backslash trick
    if (/^\s*(javascript|data|vbscript):/i.test(n)) return null;
    return n;
  } catch(e) { return null; }
}

function redirectFor(role){
  const r=normalizeRole(role);
  if(r==="medecin") return "doctor-dashboard.html";
  if(r==="admin")   return "admin-dashboard.html";
  return "patient-dashboard.html";
}

async function doLogin(e){
  e.preventDefault();
  const email=document.getElementById("le").value.trim().toLowerCase();
  const pw=document.getElementById("lp").value;
  if(!email||!pw){toastM(tabibiT('toast_fill_all_fields','Veuillez remplir tous les champs'),"error");return;}

  // ─── PROTECTION BRUTE-FORCE : max 5 tentatives par 60s par email ───
  if (window.tabibiSec && window.tabibiSec.rateLimit) {
    const limit = window.tabibiSec.rateLimit('login:' + email, 5, 60000);
    if (!limit.allowed) {
      toastM(limit.reason, "error");
      return;
    }
  }

  // ─── VALIDATION ENTRÉES ───
  if (window.tabibiSec) {
    if (!window.tabibiSec.validateEmail(email)) {
      toastM(tabibiT('toast_email_format_invalid',"Format d'email invalide"), "error");
      return;
    }
    if (pw.length < 6 || pw.length > 128) {
      toastM(tabibiT('toast_password_invalid',"Mot de passe invalide"), "error");
      return;
    }
  }

  const btn=e.target.querySelector('button[type="submit"]');
  const origText=btn?btn.innerHTML:"";
  if(btn){btn.disabled=true;btn.innerHTML='<i class="fa fa-circle-notch fa-spin"></i> Connexion...';}

  // ─── 1. AUTHENTIFICATION SUPABASE (unique méthode v10) ───
  try {
    if (!window.tabibi || !window.tabibi.auth || !window.tabibi.supabase) {
      if(btn){btn.disabled=false;btn.innerHTML=origText;}
      toastM(tabibiT('toast_auth_unavailable',"Service d'authentification indisponible. Réessayez."), "error");
      return;
    }

    await window.tabibi.auth.signIn(email, pw);

    // Récupérer le profil depuis la base
    const user = await window.tabibi.auth.getUser();
    if (!user) {
      if(btn){btn.disabled=false;btn.innerHTML=origText;}
      toastM(tabibiT('toast_profile_not_found',"Profil introuvable, contactez le support"), "error");
      return;
    }

    // ─── VÉRIFICATION DU STATUT (v10) ───
    // Si médecin en attente de validation manuelle → bloquer la connexion
    const userStatus = user.status || 'active';
    const userRole = normalizeRole(user.role);

    if (userRole === 'medecin' && userStatus === 'pending_verification') {
      // Déconnecter immédiatement
      try { await window.tabibi.auth.signOut(); } catch(e){}
      if(btn){btn.disabled=false;btn.innerHTML=origText;}
      toastM(tabibiT('toast_doctor_pending',"Votre compte médecin est en cours de vérification (48h max). Vous serez notifié par email."), "info");
      return;
    }

    if (userStatus === 'suspended') {
      try { await window.tabibi.auth.signOut(); } catch(e){}
      if(btn){btn.disabled=false;btn.innerHTML=origText;}
      toastM(tabibiT('toast_account_suspended',"Compte suspendu. Contactez contact@tabibi.doctor"), "error");
      return;
    }

    if (userStatus === 'rejected') {
      try { await window.tabibi.auth.signOut(); } catch(e){}
      if(btn){btn.disabled=false;btn.innerHTML=origText;}
      toastM(tabibiT('toast_signup_rejected',"Inscription rejetée. Contactez contact@tabibi.doctor"), "error");
      return;
    }

    // ─── CONNEXION RÉUSSIE ───
    const fName = user.first_name || "";
    const lName = user.last_name || "";
    let displayName = (fName + " " + lName).trim() || user.full_name || "";
    if (!displayName) displayName = email.split("@")[0];
    const initials = ((fName[0]||displayName[0]||"?") + (lName[0]||"")).toUpperCase();

    const userData = {
      id: user.id,
      email: user.email || email,
      role: userRole,
      status: userStatus,
      name: displayName,
      initials: initials,
      firstName: fName,
      lastName: lName,
      specialty: user.specialty_fr || user.specialty || "",
      ville: user.wilaya_fr || user.ville || "Alger",
      phone: user.phone || "",
      isTest: !!user.is_test,
      fromSupabase: true
    };
    localStorage.setItem("tabibi_user", JSON.stringify(userData));
    localStorage.setItem("tabibi_role", userRole);

    const successMsg = userData.isTest
      ? "Connexion réussie (compte test)"
      : "Connexion réussie !";
    toastM(successMsg, "success");
    // [Phase 5.2.3] Si ?next= défini et safe → redirige dessus (cas
    // auth-wall reservation.html). Sinon → redirect par défaut selon rôle.
    const nextUrl = _safeNext() || redirectFor(userRole);
    setTimeout(()=>location.href=nextUrl, 400);
    return;

  } catch(err) {
    console.warn("[login] Auth failed:", err && err.message);
    if(btn){btn.disabled=false;btn.innerHTML=origText;}
    // Message générique (ne pas révéler si c'est l'email ou le mdp qui est faux)
    toastM(tabibiT('toast_login_failed',"Email ou mot de passe incorrect"), "error");
    return;
  }
}

function toastM(m,t){const c=document.getElementById("toast-container");if(!c)return;const col={success:"#10b981",error:"#ef4444",info:"#0F7560"};const d=document.createElement("div");d.style.cssText="background:"+(col[t]||col.info)+";color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.15);margin-bottom:8px";d.textContent=m;c.appendChild(d);setTimeout(()=>{if(d.remove)d.remove();else if(d.parentNode)d.parentNode.removeChild(d);},3000);}
</script>

openapi: 3.1.0

info:
  title: Tabibi Partner API
  version: 1.0.0
  summary: API publique pour partenaires de Tabibi DZ
  description: |
    L'API Tabibi Partner permet aux **partenaires agréés** (CNAS, mutuelles,
    pharmacies, intégrateurs SI hospitaliers) d'interagir avec la plateforme
    Tabibi de manière programmatique.

    ## Authentification
    Toutes les routes (sauf `/v1/health` et `/v1/wilayas`) requièrent une clé API.

    En-tête : `Authorization: Bearer <key_id>:<key_secret>`

    Exemple : `Authorization: Bearer tbk_live_abc...:tbs_live_xyz...`

    ## Scopes
    Chaque clé est associée à un sous-ensemble de scopes (voir `securitySchemes`).
    Un appel sans scope suffisant renvoie `403 insufficient_scope`.

    ## Rate limiting
    - 60 requêtes par minute par défaut (configurable par partenaire)
    - 10 000 requêtes par jour par défaut
    - Headers renvoyés : `X-RateLimit-Limit`, `X-RateLimit-Remaining`, `X-RateLimit-Reset`
    - Statut `429` + `Retry-After` en cas de dépassement

    ## Pagination
    Tous les endpoints `list` acceptent `?limit=` (max 100, défaut 25) et `?offset=`.
    La réponse inclut `meta.pagination`.

    ## Format des IDs
    Les identifiants publics sont opaques et préfixés :
    - `doc_xxxxxxxxxxxxxxxxxxxxxx` pour les médecins
    - `apt_xxxxxxxxxxxxxxxxxxxxxx` pour les rendez-vous
    - `rx_xxxxxxxxxxxxxxxxxxxxxx`  pour les ordonnances
    - `cab_xxxxxxxxxxxxxxxxxxxxxx` pour les cabinets
    - `pat_xxxxxxxxxxxxxxxxxxxxxx` pour les patients

  contact:
    name:  Tabibi Partner Integration Team
    email: dpo@tabibi.doctor
    url:   https://tabibi.doctor/api-docs.html
  license:
    name: Tabibi Proprietary
    url:  https://tabibi.doctor/cgu.html
  termsOfService: https://tabibi.doctor/cgu.html

servers:
  - url: https://tabibi.doctor/api/v1
    description: Production (use environment=production keys)
  - url: https://sandbox.tabibi.doctor/api/v1
    description: Sandbox (use environment=sandbox keys, no real data)

security:
  - apiKey: []

tags:
  - name: Health
    description: Public health probes (no auth)
  - name: Reference data
    description: Reference data (wilayas, specialties)
  - name: Doctors
    description: Médecins agréés
  - name: Appointments
    description: Prise et gestion de rendez-vous
  - name: Prescriptions
    description: Vérification d'ordonnances (pharmacies)
  - name: Cabinets
    description: Annuaire des cabinets / cliniques

paths:

  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                data: { status: ok, version: "1.0.0", time: "2026-05-19T10:00:00Z" }

  /wilayas:
    get:
      tags: [Reference data]
      summary: Liste des wilayas algériennes
      security: []
      operationId: listWilayas
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Wilaya' }

  /specialties:
    get:
      tags: [Reference data]
      summary: Annuaire des spécialités médicales
      operationId: listSpecialties
      security:
        - apiKey: [doctors:directory]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                data:
                  - { slug: cardiologie,  name_fr: "Cardiologie",  name_ar: "أمراض القلب", name_en: "Cardiology" }
                  - { slug: dermatologie, name_fr: "Dermatologie", name_ar: "جلدية",       name_en: "Dermatology" }
                meta:
                  request_id: req_a1b2
                  pagination: { total: 48, limit: 25, offset: 0, has_more: true, next_offset: 25 }

  /doctors:
    get:
      tags: [Doctors]
      summary: Liste paginée de médecins
      operationId: listDoctors
      security:
        - apiKey: [doctors:read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - in: query
          name: wilaya
          description: Filtrer par code wilaya (ex 16 = Alger)
          schema: { type: string, example: "16" }
        - in: query
          name: specialty
          description: Filtrer par slug spécialité
          schema: { type: string, example: "cardiologie" }
        - in: query
          name: q
          description: Recherche libre sur le nom
          schema: { type: string, example: "Bouzid" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                data:
                  - id: doc_8XQrYwAaTQyzPq2nGZN6Ng
                    full_name: "Dr Karim Bouzid"
                    specialty: "Cardiologie"
                    specialty_slug: "cardiologie"
                    wilaya_code: "16"
                    wilaya: "Alger"
                    address: "Hydra, Alger"
                    consultation_fee_dzd: 3000
                    rating: 4.7
                    review_count: 124
                    gender: "M"
                    languages: ["fr","ar"]
                meta:
                  request_id: req_a1b2
                  pagination: { total: 312, limit: 25, offset: 0, has_more: true, next_offset: 25 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /doctors/{id}:
    get:
      tags: [Doctors]
      summary: Détail d'un médecin
      operationId: getDoctor
      security:
        - apiKey: [doctors:read]
      parameters:
        - $ref: '#/components/parameters/DoctorId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Doctor' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '404': { $ref: '#/components/responses/NotFound' }

  /doctors/{id}/availability:
    get:
      tags: [Doctors]
      summary: Créneaux occupés d'un médecin
      description: |
        Retourne les **créneaux occupés** (status `pending` ou `confirmed`)
        sur la fenêtre demandée. Les clients calculent eux-mêmes la
        disponibilité en soustrayant de l'horaire d'ouverture publié.
      operationId: getDoctorAvailability
      security:
        - apiKey: [doctors:read]
      parameters:
        - $ref: '#/components/parameters/DoctorId'
        - in: query
          name: from
          required: true
          schema: { type: string, format: date-time, example: "2026-05-20T00:00:00Z" }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date-time, example: "2026-05-27T00:00:00Z" }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                data:
                  doctor_id: doc_8XQrYwAaTQyzPq2nGZN6Ng
                  from: "2026-05-20T00:00:00Z"
                  to:   "2026-05-27T00:00:00Z"
                  busy_slots:
                    - { start_at: "2026-05-20T09:00:00Z", duration_minutes: 30 }
                    - { start_at: "2026-05-20T09:30:00Z", duration_minutes: 30 }
                meta: { request_id: req_a1b2 }

  /appointments:
    post:
      tags: [Appointments]
      summary: Créer un rendez-vous pour un patient
      operationId: createAppointment
      security:
        - apiKey: [appointments:write]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AppointmentCreate' }
            example:
              doctor_id:        doc_8XQrYwAaTQyzPq2nGZN6Ng
              patient_id:       pat_3KkLm9aZTU2pq8FFG2N7Hg
              scheduled_at:     "2026-05-21T09:00:00Z"
              duration_minutes: 30
              reason:           "Suivi tensionnel"
              pay_method:       "cnas"
              consult_type:     "cabinet"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Appointment' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /appointments/{id}:
    get:
      tags: [Appointments]
      summary: Détail d'un rendez-vous
      operationId: getAppointment
      security:
        - apiKey: [appointments:read]
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Appointment' }
                  meta: { $ref: '#/components/schemas/Meta' }
        '404': { $ref: '#/components/responses/NotFound' }

    delete:
      tags: [Appointments]
      summary: Annuler un rendez-vous (soft delete)
      operationId: cancelAppointment
      security:
        - apiKey: [appointments:write]
      parameters:
        - $ref: '#/components/parameters/AppointmentId'
      responses:
        '200':
          description: Annulé
          content:
            application/json:
              example:
                data:
                  id: apt_3KkLm9aZTU2pq8FFG2N7Hg
                  status: cancelled
                  cancelled_at: "2026-05-19T10:30:00Z"
                meta: { request_id: req_a1b2 }
        '404': { $ref: '#/components/responses/NotFound' }

  /prescriptions/{id}/verify:
    get:
      tags: [Prescriptions]
      summary: Vérifier la validité d'une ordonnance (pharmacie)
      description: |
        Endpoint destiné aux pharmacies pour confirmer l'authenticité d'une
        ordonnance avant délivrance des médicaments.

        La signature `sig` est imprimée sur l'ordonnance Tabibi (QR-code).
      operationId: verifyPrescription
      security:
        - apiKey: [prescriptions:verify]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, example: rx_3KkLm9aZTU2pq8FFG2N7Hg }
        - in: query
          name: sig
          required: true
          description: Signature HMAC imprimée sur l'ordonnance
          schema: { type: string, example: "9a8b7c..." }
      responses:
        '200':
          description: Résultat de la vérification
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PrescriptionVerify' }
        '404': { $ref: '#/components/responses/NotFound' }
        '501':
          description: Module ordonnances pas encore déployé
          content:
            application/json:
              example:
                errors:
                  - status: "501"
                    code: not_implemented
                    title: Not Implemented
                    detail: "Prescription verification will be available in v1.1."

  /cabinets:
    get:
      tags: [Cabinets]
      summary: Annuaire des cabinets / cliniques
      operationId: listCabinets
      security:
        - apiKey: [cabinets:read]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - in: query
          name: wilaya
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              example:
                data:
                  - id: cab_3KkLm9aZTU2pq8FFG2N7Hg
                    name: "Clinique El-Azhar"
                    wilaya_code: "16"
                    address: "Hydra, Alger"
                    phone: "+213-21-00-00-00"
                meta:
                  request_id: req_a1b2
                  pagination: { total: 14, limit: 25, offset: 0, has_more: false, next_offset: null }

components:

  securitySchemes:
    apiKey:
      type: http
      scheme: bearer
      bearerFormat: "<key_id>:<key_secret>"
      description: |
        Bearer token combining the public `key_id` and the secret, separated
        by a colon. Example :

        `Authorization: Bearer tbk_live_8x4nQ2...:tbs_live_random64chars...`

  parameters:
    Limit:
      in: query
      name: limit
      description: Nombre d'éléments par page (max 100, défaut 25)
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    Offset:
      in: query
      name: offset
      description: Décalage
      schema: { type: integer, minimum: 0, default: 0 }
    DoctorId:
      in: path
      name: id
      required: true
      schema: { type: string, example: doc_8XQrYwAaTQyzPq2nGZN6Ng }
    AppointmentId:
      in: path
      name: id
      required: true
      schema: { type: string, example: apt_3KkLm9aZTU2pq8FFG2N7Hg }

  responses:
    Unauthorized:
      description: Credentials manquants ou invalides
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            errors: [{ status: "401", code: auth_invalid, title: Unauthorized, detail: "Invalid API credentials." }]
            meta: { request_id: req_a1b2, timestamp: "2026-05-19T10:30:00Z" }
    Forbidden:
      description: Scope insuffisant
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            errors: [{ status: "403", code: insufficient_scope, title: Forbidden, detail: "This endpoint requires scope 'doctors:read'." }]
            meta: { request_id: req_a1b2, timestamp: "2026-05-19T10:30:00Z" }
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    BadRequest:
      description: Paramètres invalides
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Conflit (créneau pris, etc.)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    RateLimited:
      description: Rate limit dépassé
      headers:
        Retry-After:        { schema: { type: integer }, description: Délai en secondes }
        X-RateLimit-Limit:  { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
        X-RateLimit-Reset:  { schema: { type: string, format: date-time } }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:

    HealthResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status:  { type: string, enum: [ok, degraded] }
            version: { type: string }
            time:    { type: string, format: date-time }
        meta: { $ref: '#/components/schemas/Meta' }

    Meta:
      type: object
      properties:
        request_id: { type: string }
        pagination: { $ref: '#/components/schemas/Pagination' }

    Pagination:
      type: object
      properties:
        total:        { type: integer }
        limit:        { type: integer }
        offset:       { type: integer }
        has_more:     { type: boolean }
        next_offset:  { type: integer, nullable: true }

    Paginated:
      type: object
      properties:
        data:  { type: array, items: { type: object } }
        meta:  { $ref: '#/components/schemas/Meta' }

    Wilaya:
      type: object
      properties:
        code:    { type: string, example: "16" }
        name_fr: { type: string, example: "Alger" }
        name_ar: { type: string, example: "الجزائر" }
        name_en: { type: string, example: "Algiers" }

    Doctor:
      type: object
      properties:
        id:                   { type: string, example: doc_8XQrYwAaTQyzPq2nGZN6Ng }
        full_name:            { type: string }
        full_name_ar:         { type: string, nullable: true }
        first_name:           { type: string }
        last_name:            { type: string }
        specialty:            { type: string }
        specialty_slug:       { type: string }
        wilaya_code:          { type: string }
        wilaya_fr:            { type: string }
        wilaya_ar:            { type: string }
        wilaya_en:            { type: string }
        address:              { type: string, nullable: true }
        consultation_fee_dzd: { type: integer, nullable: true }
        rating:               { type: number,  nullable: true }
        review_count:         { type: integer }
        gender:               { type: string,  enum: [M, F], nullable: true }
        languages:            { type: array,   items: { type: string } }
        bio:                  { type: string,  nullable: true }
        is_verified:          { type: boolean }

    AppointmentCreate:
      type: object
      required: [doctor_id, patient_id, scheduled_at]
      properties:
        doctor_id:        { type: string, example: doc_8XQrYwAaTQyzPq2nGZN6Ng }
        patient_id:       { type: string, example: pat_3KkLm9aZTU2pq8FFG2N7Hg }
        scheduled_at:     { type: string, format: date-time, example: "2026-05-21T09:00:00Z" }
        duration_minutes: { type: integer, minimum: 5, maximum: 240, default: 30 }
        reason:           { type: string,  maxLength: 500 }
        pay_method:       { type: string,  enum: [cash, cnas, mutuelle, card], default: cash }
        consult_type:     { type: string,  enum: [cabinet, video, domicile], default: cabinet }

    Appointment:
      type: object
      properties:
        id:               { type: string, example: apt_3KkLm9aZTU2pq8FFG2N7Hg }
        doctor_id:        { type: string }
        patient_id:       { type: string }
        scheduled_at:     { type: string, format: date-time }
        duration_minutes: { type: integer }
        status:           { type: string, enum: [pending, confirmed, cancelled, completed, no_show] }
        reason:           { type: string, nullable: true }
        consult_type:     { type: string }
        pay_method:       { type: string }
        created_at:       { type: string, format: date-time }
        cancelled_at:     { type: string, format: date-time, nullable: true }

    PrescriptionVerify:
      type: object
      properties:
        data:
          type: object
          properties:
            id:         { type: string }
            doctor_id:  { type: string }
            patient_id: { type: string }
            issued_at:  { type: string, format: date-time }
            expires_at: { type: string, format: date-time, nullable: true }
            status:     { type: string, enum: [active, expired, revoked] }
            verified:   { type: boolean }
            expired:    { type: boolean }
        meta: { $ref: '#/components/schemas/Meta' }

    Cabinet:
      type: object
      properties:
        id:          { type: string, example: cab_3KkLm9aZTU2pq8FFG2N7Hg }
        name:        { type: string }
        wilaya_code: { type: string }
        address:     { type: string, nullable: true }
        phone:       { type: string, nullable: true }

    Patient:
      type: object
      description: |
        Représentation minimale d'un patient. L'accès complet nécessite le
        scope `patients:read`, accordé uniquement aux partenaires CNAS et
        mutuelles agréés sous accord DPO.
      properties:
        id:         { type: string, example: pat_3KkLm9aZTU2pq8FFG2N7Hg }
        first_name: { type: string }
        last_name:  { type: string }
        wilaya_code:{ type: string }
        created_at: { type: string, format: date-time }

    ErrorResponse:
      type: object
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              status: { type: string }
              code:   { type: string }
              title:  { type: string }
              detail: { type: string }
        meta: { $ref: '#/components/schemas/Meta' }

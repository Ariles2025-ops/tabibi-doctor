<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Tabibi watermark blanc">
  <title>Tabibi mark — watermark mono blanc</title>
  <desc>Version mono blanche du mark Tabibi pour usage sur fonds verts, photos, ou tout fond foncé. Le carré arrondi est transparent, seuls le caducée et l'étoile DZ sont en blanc.</desc>
  <!-- Carré arrondi de contour (1px blanc à 60% d'opacité) -->
  <rect x="0.5" y="0.5" width="119" height="119" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="1" rx="20"/>
  <!-- Bâton central -->
  <rect x="56" y="28" width="8" height="70" fill="#FFFFFF" rx="2"/>
  <!-- Ailes -->
  <path d="M 42 35 Q 28 31 22 41 Q 30 38 42 41 Z" fill="#FFFFFF"/>
  <path d="M 78 35 Q 92 31 98 41 Q 90 38 78 41 Z" fill="#FFFFFF"/>
  <!-- Serpent stylisé -->
  <path d="M 60 38 Q 48 48 60 58 Q 72 68 60 78 Q 48 88 60 95" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Étoile DZ en blanc (jamais doré sur photo claire = invisible) -->
  <g transform="translate(98, 22)">
    <polygon points="0,-9 2.5,-2.5 9,-2.5 3.5,2 5.5,9 0,4.5 -5.5,9 -3.5,2 -9,-2.5 -2.5,-2.5" fill="#FFFFFF"/>
  </g>
</svg>

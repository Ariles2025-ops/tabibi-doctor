<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#1E90FF"/>
      <stop offset="100%" stop-color="#1479D8"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles (stéthoscope feel) -->
  <circle cx="1050" cy="120" r="180" fill="rgba(255,255,255,0.06)"/>
  <circle cx="120" cy="510" r="220" fill="rgba(255,255,255,0.05)"/>
  <circle cx="1100" cy="540" r="100" fill="rgba(255,255,255,0.07)"/>
  
  <!-- Logo carré arrondi blanc avec heart-pulse bleu -->
  <g transform="translate(90, 90)" filter="url(#shadow)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="#ffffff"/>
    <!-- Heart pulse icon -->
    <path d="M 22 50 L 35 50 L 42 38 L 52 62 L 60 44 L 68 50 L 78 50" 
          stroke="#1E90FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Marque Tabibi -->
  <text x="220" y="160" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="68" font-weight="800" fill="#ffffff">Tabibi</text>
  <text x="430" y="160" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="68" font-weight="300" fill="rgba(255,255,255,0.85)">DZ</text>
  
  <!-- Titre principal -->
  <text x="90" y="320" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">Trouvez votre médecin</text>
  <text x="90" y="395" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="58" font-weight="800" fill="#ffffff">en ligne en Algérie</text>
  
  <!-- Sous-titre -->
  <text x="90" y="465" font-family="-apple-system, Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.85)">14 508 médecins certifiés · 48 wilayas couvertes</text>
  
  <!-- Badges en bas -->
  <g transform="translate(90, 510)">
    <rect x="0" y="0" width="225" height="56" rx="28" fill="rgba(255,255,255,0.18)"/>
    <text x="112" y="37" font-family="-apple-system, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">RDV en ligne 24/7</text>
  </g>
  <g transform="translate(335, 510)">
    <rect x="0" y="0" width="200" height="56" rx="28" fill="rgba(255,255,255,0.18)"/>
    <text x="100" y="37" font-family="-apple-system, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Gratuit patients</text>
  </g>
  <g transform="translate(555, 510)">
    <rect x="0" y="0" width="240" height="56" rx="28" fill="rgba(255,255,255,0.18)"/>
    <text x="120" y="37" font-family="-apple-system, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">Médecins certifiés</text>
  </g>
  
  <!-- URL -->
  <text x="1110" y="595" font-family="-apple-system, Arial, sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.7)" text-anchor="end">tabibi.com</text>
</svg>
